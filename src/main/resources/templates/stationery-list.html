<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationery | BookNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-brown: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
            --price: #d0021b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        /* ===== LAYOUT ===== */
        .main-grid {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* ===== SIDEBAR ===== */
        .sidebar-box {
            background: #fff;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            border-radius: 4px;
            overflow: hidden;
        }

        .sidebar-box h3 {
            background: #f3f3f3;
            padding: 10px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            color: var(--vb-brown);
            text-transform: uppercase;
        }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-list li a {
            display: block;
            padding: 8px 10px;
            text-decoration: none;
            color: #444;
            border-bottom: 1px dotted #eee;
        }

        .sidebar-list li a:hover,
        .sidebar-list li a.active {
            background: #fafafa;
            color: var(--vb-brown);
        }

        /* Advanced Search Form */
        .search-form-box input,
        .search-form-box select {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 12px;
            margin-bottom: 8px;
            outline: none;
            color: #555;
        }

        .search-form-box input:focus,
        .search-form-box select:focus {
            border-color: var(--vb-brown);
        }

        .search-form-box .price-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-search {
            width: 100%;
            padding: 9px;
            background: var(--vb-brown);
            color: #fff;
            border: none;
            border-radius: 3px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            margin-top: 4px;
        }

        .btn-search:hover { filter: brightness(0.9); }

        /* Price Range Links */
        .price-range-list {
            list-style: none;
        }

        .price-range-list li a {
            display: block;
            padding: 7px 10px;
            text-decoration: none;
            color: #444;
            border-bottom: 1px dotted #eee;
            font-size: 12px;
        }

        .price-range-list li a:hover,
        .price-range-list li a.active {
            color: var(--vb-brown);
            background: #fafafa;
        }

        /* ===== CONTENT SECTION ===== */
        .content-section {
            background: #fff;
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--vb-brown);
            padding-bottom: 8px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .section-header h2 {
            font-size: 16px;
            color: var(--vb-brown);
            text-transform: uppercase;
        }

        /* ===== PRODUCT GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .product-card {
            text-align: center;
            padding: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
            background: #fff;
        }

        .product-card:hover {
            border: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }

        .product-card .img-wrap {
            width: 130px;
            height: 130px;
            margin: 0 auto 10px;
            border-radius: 4px;
            overflow: hidden;
            background: #fdfdfd;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #f0f0f0;
        }

        .product-card .img-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-card .img-wrap .no-img-icon {
            color: #ccc;
        }

        .product-title {
            font-size: 13px;
            font-weight: 500;
            color: #0066cc;
            margin-bottom: 4px;
            height: 36px;
            overflow: hidden;
            line-height: 1.4;
            text-decoration: none;
            display: block;
        }

        .product-title:hover { text-decoration: underline; }

        .product-brand {
            font-size: 11px;
            color: #888;
            margin-bottom: 6px;
            height: 16px;
            overflow: hidden;
        }

        .product-price {
            color: var(--price);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .btn-add-cart {
            display: block;
            width: 100%;
            padding: 8px 0;
            background: var(--vb-brown);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-add-cart:hover { filter: brightness(0.9); }

        .btn-view-detail {
            display: block;
            width: 100%;
            padding: 7px 0;
            background: #fff;
            color: var(--vb-brown);
            border: 1px solid var(--vb-brown);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-view-detail:hover {
            background: var(--vb-brown);
            color: #fff;
        }

        /* ===== PAGINATION ===== */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .pagination a,
        .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 3px;
            text-decoration: none;
            color: var(--text);
            font-size: 13px;
            background: #fff;
        }

        .pagination a:hover { background: #f3f3f3; }

        .pagination .current {
            background: var(--vb-brown);
            color: #fff;
            border-color: var(--vb-brown);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>

    <!-- Shared Header -->
    <div th:replace="~{fragments/site-header :: siteHeader(activePage='stationery')}"></div>

    <!-- ===== MAIN ===== -->
    <main class="container main-grid">

        <!-- SIDEBAR -->
        <aside>
            <div class="sidebar-box">
                <h3>Advanced Search</h3>
                <div style="padding: 10px;" class="search-form-box">
                    <form method="get" th:action="@{/stationery}">
                        <input type="text" name="name" placeholder="Enter item name..." th:value="${param.name}">
                        <select name="categoryId">
                            <option value="">All Categories</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${#strings.equals(param.categoryId, #strings.toString(cat.id))}"></option>
                        </select>
                        <div class="price-row">
                            <input type="number" name="minPrice" placeholder="Price from..." min="0" th:value="${param.minPrice}">
                            <input type="number" name="maxPrice" placeholder="Price to..." min="0" th:value="${param.maxPrice}">
                        </div>
                        <select name="sort">
                            <option value="name_asc" th:selected="${param.sort == 'name_asc'}">Name (A-Z)</option>
                            <option value="price_asc" th:selected="${param.sort == 'price_asc'}">Price Low to High</option>
                            <option value="price_desc" th:selected="${param.sort == 'price_desc'}">Price High to Low</option>
                        </select>
                        <button type="submit" class="btn-search">Search Items</button>
                    </form>
                </div>
            </div>

            <div class="sidebar-box">
                <h3>Price Range</h3>
                <ul class="price-range-list">
                    <li><a th:href="@{/stationery}">All items</a></li>
                    <li><a th:href="@{/stationery(maxPrice=50000)}">Under 50,000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=50000,maxPrice=100000)}">50,000 – 100,000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=100000,maxPrice=200000)}">100,000 – 200,000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=200000,maxPrice=500000)}">200,000 – 500,000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=500000)}">Above 500,000 VND</a></li>
                </ul>
            </div>
        </aside>

        <!-- CONTENT -->
        <section>
            <div class="content-section">
                <div class="section-header">
                    <h2>BookNest Stationery</h2>
                    <a th:href="@{/stationery}" style="font-size: 11px; text-decoration: none; color: #0066cc;">Reset filters</a>
                </div>

                <div th:if="${#lists.isEmpty(items)}" style="padding: 40px; text-align: center; color: #999;">
                    No stationery items found matching your search.
                </div>

                <div th:if="${!#lists.isEmpty(items)}" class="product-grid">
                    <div th:each="item : ${items}" class="product-card">
                        <a th:href="@{/stationery/detail/{id}(id=${item.id})}">
                            <div class="img-wrap">
                                <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}" th:src="${item.imageUrl}" th:alt="${item.title}">
                                <i th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}" data-lucide="package" size="40" style="color:#ccc;"></i>
                            </div>
                        </a>
                        <a class="product-title" th:href="@{/stationery/detail/{id}(id=${item.id})}" th:text="${item.title}">Item Name</a>
                        <p class="product-brand" th:text="${item.author}">Brand</p>
                        <p class="product-price" th:text="${item.price != null ? #numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' VND' : '0 VND'}">0 VND</p>
                        
                        <form th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="bookId" th:value="${item.id}" />
                            <input type="hidden" name="quantity" value="1" />
                            <button type="submit" class="btn-add-cart">Add to Cart</button>
                        </form>
                        <a th:href="@{/stationery/detail/{id}(id=${item.id})}" class="btn-view-detail">View Details</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Shared Footer -->
    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
