<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Stationery List</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-green: #3ea31a;
            --vb-brown: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
            --price: #d0021b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-gray); color: var(--text); font-size: 13px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 10px; }
        .page-main { display: grid; grid-template-columns: 280px 1fr; gap: 20px; margin-bottom: 30px; }
        .panel { background: #fff; border: 1px solid var(--border); border-radius: 4px; }
        .panel-header { background: #f3f3f3; color: var(--vb-brown); text-transform: uppercase; font-weight: 700; font-size: 13px; padding: 12px; border-bottom: 1px solid var(--border); }
        .panel-body { padding: 14px; }
        .search-grid { display: grid; gap: 10px; }
        .search-grid input, .search-grid select { width: 100%; border: 1px solid #d8d8d8; border-radius: 4px; padding: 10px; outline: none; }
        .search-grid input:focus, .search-grid select:focus { border-color: var(--vb-brown); }
        .search-grid button { border: none; background: var(--vb-brown); color: #fff; font-weight: 700; border-radius: 4px; padding: 10px; cursor: pointer; }
        .sidebar-list { list-style: none; }
        .sidebar-list li a { display: block; padding: 8px 0; border-bottom: 1px dotted #eee; text-decoration: none; color: #444; }
        .sidebar-list li a:hover { color: var(--vb-brown); }
        .books-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 2px solid var(--vb-brown); padding-bottom: 8px; margin-bottom: 15px; }
        .books-head h1 { font-size: 20px; color: var(--vb-brown); text-transform: uppercase; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
        .book-card { border: 1px solid #eee; padding: 10px; text-align: center; transition: box-shadow 0.2s, transform 0.2s; text-decoration: none; color: inherit; background: #fff; border-radius: 4px; }
        .book-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08); }
        .book-cover { width: 120px; height: 175px; margin: 0 auto 10px; object-fit: cover; border: 1px solid #eee; background: #fafafa; }
        .book-title { font-size: 13px; color: #0066cc; height: 36px; overflow: hidden; line-height: 1.35; margin-bottom: 4px; font-weight: 500; }
        .book-author { color: #888; font-size: 11px; height: 16px; overflow: hidden; margin-bottom: 8px; }
        .book-price { color: var(--price); font-size: 14px; font-weight: 700; }
        .book-stock { margin-top: 6px; font-size: 11px; color: #666; }
        .pager { margin-top: 18px; display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        .pager a, .pager span { min-width: 34px; height: 34px; border: 1px solid #ddd; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: #555; background: #fff; font-weight: 600; padding: 0 8px; }
        .pager a.active { background: var(--vb-brown); color: #fff; border-color: var(--vb-brown); }
        .hidden { display: none; }
        @media (max-width: 1024px) { .page-main { grid-template-columns: 1fr; } }
        @media (max-width: 640px) { .books-grid { grid-template-columns: repeat(2, minmax(130px, 1fr)); } }
    </style>
</head>

<body>
    <div th:replace="~{fragments/site-header :: siteHeader('stationery')}"></div>

    <main class="container page-main">
        <aside class="panel">
            <div class="panel-header">Advanced search</div>
            <div class="panel-body">
                <form th:action="@{/stationery/search}" method="get" class="search-grid">
                    <input type="hidden" name="categoryId" th:value="${selectedCategoryId}">
                    <div style="position: relative;">
                        <input id="title-search-input" type="text" name="title" th:value="${title}" autocomplete="off"
                            placeholder="Enter item name...">
                        <div id="title-suggest-box" class="hidden"
                            style="position:absolute;top:100%;left:0;right:0;z-index:20;background:#fff;border:1px solid #e6e6e6;max-height:220px;overflow-y:auto;">
                        </div>
                    </div>
                    <input type="number" min="0" step="1000" name="minPrice" th:value="${minPrice}"
                        placeholder="Price from...">
                    <input type="number" min="0" step="1000" name="maxPrice" th:value="${maxPrice}"
                        placeholder="Price to...">
                    <button type="submit">Search Stationery</button>
                </form>
            </div>

            <div class="panel-header">Price Range</div>
            <div class="panel-body" style="padding-top: 4px;">
                <ul class="sidebar-list">
                    <li><a th:href="@{/stationery}">All stationery</a></li>
                    <li><a th:href="@{/stationery(maxPrice=50000)}">Under 50.000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=50000,maxPrice=100000)}">50.000 VND - 100.000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=100000,maxPrice=200000)}">100.000 VND - 200.000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=200000,maxPrice=500000)}">200.000 VND - 500.000 VND</a></li>
                    <li><a th:href="@{/stationery(minPrice=500000)}">Above 500.000 VND</a></li>
                </ul>
            </div>
        </aside>

        <section class="panel">
            <div class="panel-body">
                <div class="books-head">
                    <h1>Stationery Collection</h1>
                </div>

                <div th:if="${#lists.isEmpty(items)}" style="padding: 20px 6px; color: #666;">No items found.</div>

                <div th:if="${!#lists.isEmpty(items)}" class="books-grid">
                    <!-- LINK ĐÃ SỬA: Sắp xếp theo chuẩn /stationery/{id} -->
                    <a th:each="item : ${items}" th:href="@{/stationery/{id}(id=${item.id})}" class="book-card">
                        <img class="book-cover" th:src="${item.imageUrl != null and !item.imageUrl.isEmpty() ? item.imageUrl : 'https://via.placeholder.com/120x175?text=No+Image'}" th:alt="${item.title}">
                        <h3 class="book-title" th:text="${item.title}">Item Name</h3>
                        <p class="book-author" th:text="${item.author != null and !item.author.isBlank() ? item.author : 'Brand'}">Brand</p>
                        <p class="book-price" th:text="${item.price != null ? #numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' VND' : '0 VND'}">0 VND</p>
                        <p class="book-stock" th:text="${item.stock != null and item.stock > 0 ? 'Available: ' + item.stock : 'Out of stock'}">Available: 0</p>
                    </a>
                </div>

                <div class="pager" th:if="${totalPages > 1}">
                    <a th:if="${hasPrevious}" th:href="${isSearch} ? @{/stationery/search(title=${title},categoryId=${selectedCategoryId},minPrice=${minPrice},maxPrice=${maxPrice},page=${page-1})} : @{/stationery(page=${page-1},categoryId=${selectedCategoryId},minPrice=${minPrice},maxPrice=${maxPrice})}">&lt;</a>
                    <a th:each="p : ${#numbers.sequence(1, totalPages)}" th:href="${isSearch} ? @{/stationery/search(title=${title},categoryId=${selectedCategoryId},minPrice=${minPrice},maxPrice=${maxPrice},page=${p})} : @{/stationery(page=${p},categoryId=${selectedCategoryId},minPrice=${minPrice},maxPrice=${maxPrice})}" th:text="${p}" th:classappend="${p == page} ? ' active' : ''">1</a>
                    <a th:if="${hasNext}" th:href="${isSearch} ? @{/stationery/search(title=${title},categoryId=${selectedCategoryId},minPrice=${minPrice},maxPrice=${maxPrice},page=${page+1})} : @{/stationery(page=${page+1},categoryId=${selectedCategoryId},minPrice=${minPrice},maxPrice=${maxPrice})}">&gt;</a>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
