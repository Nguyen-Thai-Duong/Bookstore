<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Stationery</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-green: #3ea31a;
            --vb-brown: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
            --price: #d0021b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .page-main {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .panel-header {
            background: #f3f3f3;
            color: var(--vb-brown);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 13px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .panel-body {
            padding: 14px;
        }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-list li a {
            display: block;
            padding: 8px 0;
            border-bottom: 1px dotted #eee;
            text-decoration: none;
            color: #444;
        }

        .sidebar-list li a:hover {
            color: var(--vb-brown);
        }

        .search-grid {
            display: grid;
            gap: 10px;
        }

        .search-grid input,
        .search-grid select {
            width: 100%;
            border: 1px solid #d8d8d8;
            border-radius: 4px;
            padding: 10px;
            outline: none;
        }

        .search-grid input:focus,
        .search-grid select:focus {
            border-color: var(--vb-brown);
        }

        .search-grid button {
            border: none;
            background: var(--vb-brown);
            color: #fff;
            font-weight: 700;
            border-radius: 4px;
            padding: 10px;
            cursor: pointer;
        }

        .search-grid button:hover {
            filter: brightness(0.95);
        }

        .price-range-list {
            list-style: none;
        }

        .price-range-list li a {
            display: block;
            padding: 8px 0;
            border-bottom: 1px dotted #eee;
            text-decoration: none;
            color: #444;
            font-size: 12px;
        }

        .price-range-list li a:hover {
            color: var(--vb-brown);
        }

        .books-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 2px solid var(--vb-brown);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .books-head h1 {
            font-size: 20px;
            color: var(--vb-brown);
            text-transform: uppercase;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 14px;
        }

        .book-card {
            display: block;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .book-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }

        .book-cover-wrap {
            width: 120px;
            height: 175px;
            margin: 0 auto 10px;
            border-radius: 4px;
            overflow: hidden;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-cover-wrap .no-img-icon {
            color: #ccc;
        }

        .book-title {
            font-size: 13px;
            font-weight: 500;
            color: #0066cc;
            margin-bottom: 4px;
            height: 36px;
            overflow: hidden;
            line-height: 1.35;
            display: block;
        }

        .book-title:hover {
            text-decoration: underline;
        }

        .book-author {
            color: #888;
            font-size: 11px;
            height: 16px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .book-price {
            color: var(--price);
            font-size: 14px;
            font-weight: 700;
        }

        .book-stock {
            margin-top: 6px;
            font-size: 11px;
            color: #666;
        }

        .pager {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .pager a,
        .pager span {
            min-width: 34px;
            height: 34px;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #555;
            background: #fff;
            font-weight: 600;
            padding: 0 8px;
        }

        .pager a:hover {
            background: #f3f3f3;
        }

        .pager .current {
            background: var(--vb-brown);
            color: #fff;
            border-color: var(--vb-brown);
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }

        @media (max-width: 1024px) {
            .page-main {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .books-grid {
                grid-template-columns: repeat(2, minmax(130px, 1fr));
            }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/site-header :: siteHeader('stationery')}"></div>

    <main class="container page-main">
        <aside>
            <div class="panel" style="margin-bottom: 20px;">
                <div class="panel-header">Advanced Search</div>
                <div class="panel-body">
                    <form method="get" th:action="@{/stationery}" class="search-grid">
                        <input type="text" name="name" placeholder="Enter item name..." th:value="${param.name}">

                        <select name="categoryId">
                            <option value="">All Categories</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${#strings.equals(param.categoryId, #strings.toString(cat.id))}"></option>
                        </select>

                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
                            <input type="number" name="minPrice" placeholder="Price from..." min="0" step="1000"
                                th:value="${param.minPrice}">
                            <input type="number" name="maxPrice" placeholder="Price to..." min="0" step="1000"
                                th:value="${param.maxPrice}">
                        </div>

                        <select name="sort">
                            <option value="name_asc" th:selected="${param.sort == 'name_asc'}">Name (A-Z)</option>
                            <option value="price_asc" th:selected="${param.sort == 'price_asc'}">Price Low to High
                            </option>
                            <option value="price_desc" th:selected="${param.sort == 'price_desc'}">Price High to Low
                            </option>
                            <option value="newest" th:selected="${param.sort == 'newest'}">Newest</option>
                        </select>

                        <button type="submit">Search Items</button>
                    </form>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Price Range</div>
                <div class="panel-body">
                    <ul class="price-range-list">
                        <li><a th:href="@{/stationery}">All items</a></li>
                        <li><a th:href="@{/stationery(maxPrice=50000)}">Under 50,000 VND</a></li>
                        <li><a th:href="@{/stationery(minPrice=50000,maxPrice=100000)}">50,000 – 100,000 VND</a></li>
                        <li><a th:href="@{/stationery(minPrice=100000,maxPrice=200000)}">100,000 – 200,000 VND</a></li>
                        <li><a th:href="@{/stationery(minPrice=200000,maxPrice=500000)}">200,000 – 500,000 VND</a></li>
                        <li><a th:href="@{/stationery(minPrice=500000)}">Above 500,000 VND</a></li>
                    </ul>
                </div>
            </div>
        </aside>

        <section class="panel">
            <div class="panel-body">
                <div class="books-head">
                    <h1>BookNest Stationery</h1>
                    <a th:href="@{/stationery}" style="font-size: 11px; text-decoration: none; color: #0066cc;">Reset
                        filters</a>
                </div>

                <p th:if="${#lists.isEmpty(items)}" class="empty-state">
                    No stationery items found matching your search.
                </p>

                <div th:if="${!#lists.isEmpty(items)}" class="books-grid">
                    <a th:each="item : ${items}" class="book-card" th:href="@{/stationery/{id}(id=${item.id})}">
                        <div class="book-cover-wrap">
                            <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}" th:src="${item.imageUrl}"
                                th:alt="${item.title}">
                            <div th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}" class="no-img-icon">
                                <i data-lucide="package" size="40"></i>
                            </div>
                        </div>

                        <span class="book-title" th:text="${item.title}">Item Name</span>
                        <p class="book-author" th:text="${item.author}">Brand</p>
                        <p class="book-price"
                            th:text="${item.price != null ? #numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' VND' : '0 VND'}">
                            0 VND
                        </p>
                        <p class="book-stock" th:text="|Available: ${item.stock != null ? item.stock : 0}|"></p>
                    </a>
                </div>

                <div th:if="${totalPages != null and totalPages > 1}" class="pager">
                    <a th:if="${currentPage > 0}"
                        th:href="@{/stationery(page=${currentPage - 1}, name=${param.name}, categoryId=${param.categoryId}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}">&laquo;</a>

                    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                        <a th:if="${i != currentPage}"
                            th:href="@{/stationery(page=${i}, name=${param.name}, categoryId=${param.categoryId}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}"
                            th:text="${i + 1}">1</a>
                        <span th:if="${i == currentPage}" class="current" th:text="${i + 1}">1</span>
                    </th:block>

                    <a th:if="${currentPage < totalPages - 1}"
                        th:href="@{/stationery(page=${currentPage + 1}, name=${param.name}, categoryId=${param.categoryId}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}">&raquo;</a>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
