<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-brown: #8B573C;
            --bg-gray: #f5f5f5;
            --border: #ddd;
        }

        body {
            background: var(--bg-gray);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .panel-head {
            background: #f3f3f3;
            color: var(--vb-brown);
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 700;
            padding: 12px 14px;
            text-transform: uppercase;
            text-align: center;
        }

        .panel-body {
            padding: 24px;
        }

        .field {
            margin-bottom: 15px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .field input {
            width: 100%;
            border: 1px solid #d8d8d8;
            border-radius: 4px;
            padding: 11px;
            outline: none;
            box-sizing: border-box;
        }

        .field input:focus {
            border-color: var(--vb-brown);
        }

        .btn-submit {
            width: 100%;
            border: none;
            background: var(--vb-brown);
            color: #fff;
            font-weight: 700;
            border-radius: 4px;
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .error-box {
            margin-bottom: 12px;
            border: 1px solid #f3c3c3;
            background: #fff3f3;
            color: #ba1f1f;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
        }
        
        .success-box {
            margin-bottom: 12px;
            border: 1px solid #c3f3c3;
            background: #f3fff3;
            color: #1fba1f;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="panel">
        <div class="panel-head">Reset Password</div>
        <div class="panel-body">
            <div th:if="${error}" class="error-box" th:text="${error}"></div>
            <div th:if="${successMessage}" class="success-box" th:text="${successMessage}"></div>

            <form method="post" th:action="@{/reset-password}">
                <div class="field">
                    <label>New Password</label>
                    <input type="password" name="newPassword" required minlength="6" placeholder="••••••••">
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" name="confirmPassword" required minlength="6" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit">Update Password</button>
            </form>
        </div>
    </div>
</body>
</html>
