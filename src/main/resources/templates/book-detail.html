<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Detail</title>
</head>
<body>

<h1>Book Detail</h1>

<div th:if="${book == null}">
    <p>Book not found.</p>
    <a th:href="@{/books}">Back to list</a>
</div>

<div th:if="${book != null}">
    <h2 th:text="${book.title}"></h2>
    <p><strong>Author:</strong> <span th:text="${book.author}"></span></p>
    <p><strong>Price:</strong> <span th:text="${book.price}"></span></p>
    <p><strong>Stock:</strong> <span th:text="${book.stockQuantity}"></span></p>
    <p><strong>Description:</strong> <span th:text="${book.description}"></span></p>
    <p><strong>Category ID:</strong> <span th:text="${book.categoryID}"></span></p>
    <p><strong>Created At:</strong> <span th:text="${book.createdAt}"></span></p>
    <p><strong>Image URL:</strong> <span th:text="${book.imageURL}"></span></p>

    <a th:href="@{/books}">Back to list</a>
</div>

</body>
</html>
