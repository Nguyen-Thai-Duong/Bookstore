<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <style>
        .star-input input {
            display: none;
        }

        .star-input label {
            color: #e5e0d8;
            cursor: pointer;
            font-size: 1.25rem;
            line-height: 1;
        }

        .star-input input:checked~label,
        .star-input label:hover,
        .star-input label:hover~label {
            color: #f59e0b;
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="bg-[#f8f6f1] text-[#1a1410]">
    <div class="max-w-5xl mx-auto px-6 py-10">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-semibold">Book Details</h1>
            <a th:href="@{/books}" class="text-sm underline">Go back to list</a>
        </div>

        <div class="bg-white rounded-2xl p-6">
            <h2 class="text-xl font-semibold" th:text="${book.title}">Book Title</h2>
            <p class="text-sm text-gray-600" th:text="${book.author}">Author</p>
            <p class="mt-1 text-sm">Category: <span
                    th:text="${book.category != null and book.category.name != null ? book.category.name : 'N/A'}">N/A</span>
            </p>
            <p class="text-sm">Product type: <span
                    th:text="${book.category != null and book.category.productTypeName != null ? book.category.productTypeName : 'N/A'}">N/A</span>
            </p>
            <p class="text-sm">Publisher: <span
                    th:text="${book.publisher != null and !book.publisher.isBlank() ? book.publisher : 'N/A'}">N/A</span>
            </p>
            <p class="text-sm">Published year: <span
                    th:text="${book.publishedYear != null ? book.publishedYear : 'N/A'}">N/A</span>
            </p>
            <p class="text-sm">Page count: <span th:text="${book.pageCount != null ? book.pageCount : 'N/A'}">N/A</span>
            </p>
            <p class="text-sm">Size (W x H x T): <span
                    th:text="${book.widthCm != null and book.heightCm != null and book.thicknessCm != null ? #numbers.formatDecimal(book.widthCm, 1, 'COMMA', 2, 'POINT') + ' x ' + #numbers.formatDecimal(book.heightCm, 1, 'COMMA', 2, 'POINT') + ' x ' + #numbers.formatDecimal(book.thicknessCm, 1, 'COMMA', 2, 'POINT') + ' cm' : 'N/A'}">N/A</span>
            </p>
            <p class="mt-2 text-sm" th:text="${book.description}">Description</p>
            <div class="mt-2 text-sm">Price: <span th:text="${book.price}">0</span></div>
            <div class="text-sm">Stock: <span th:text="${book.stock}">0</span></div>

            <form method="post" th:action="@{/cart/add}" class="mt-4 flex items-center gap-2">
                <input type="hidden" name="bookId" th:value="${book.id}">
                <input type="number" name="quantity" min="1" value="1" class="w-20 px-2 py-1 border rounded">
                <button type="submit" class="px-4 py-2 rounded bg-[#F37021] text-white">Add to cart</button>
            </form>
        </div>

        <div class="mt-8">
            <h3 class="text-lg font-semibold mb-2">Reviews</h3>
            <div th:if="${reviewError}" class="mb-3 rounded-xl px-4 py-3 text-sm"
                style="background-color: rgba(220, 38, 38, 0.1); color: #b91c1c;" th:text="${reviewError}"></div>
            <div th:if="${reviewSuccess}" class="mb-3 rounded-xl px-4 py-3 text-sm"
                style="background-color: rgba(22, 163, 74, 0.12); color: #166534;" th:text="${reviewSuccess}"></div>

            <div th:if="${#lists.isEmpty(reviews)}" class="bg-white rounded-2xl p-4">
                <p>No reviews yet.</p>
            </div>

            <div th:if="${!#lists.isEmpty(reviews)}" class="space-y-3">
                <div th:each="review : ${reviews}" class="bg-white rounded-2xl p-4">
                    <div class="flex justify-between text-sm">
                        <span th:text="${review.user.fullName}">User</span>
                        <span th:text="${review.rating}">5</span>
                    </div>
                    <p class="mt-2 text-sm" th:text="${review.comment}">Content</p>

                    <div th:if="${myReview != null and myReview.reviewID == review.reviewID}" class="mt-3 space-y-2">
                        <form method="post" th:action="@{/reviews/update}" class="space-y-2">
                            <input type="hidden" name="reviewId" th:value="${review.reviewID}">
                            <input type="hidden" name="bookId" th:value="${book.bookID}">
                            <div class="flex items-center gap-3">
                                <label class="text-sm">Reviews</label>
                                <div class="star-input flex flex-row-reverse justify-end gap-1">
                                    <input type="radio" id="edit-star-5" name="rating" value="5"
                                        th:checked="${review.rating == 5}">
                                    <label for="edit-star-5">★</label>
                                    <input type="radio" id="edit-star-4" name="rating" value="4"
                                        th:checked="${review.rating == 4}">
                                    <label for="edit-star-4">★</label>
                                    <input type="radio" id="edit-star-3" name="rating" value="3"
                                        th:checked="${review.rating == 3}">
                                    <label for="edit-star-3">★</label>
                                    <input type="radio" id="edit-star-2" name="rating" value="2"
                                        th:checked="${review.rating == 2}">
                                    <label for="edit-star-2">★</label>
                                    <input type="radio" id="edit-star-1" name="rating" value="1"
                                        th:checked="${review.rating == 1}">
                                    <label for="edit-star-1">★</label>
                                </div>
                            </div>
                            <textarea name="content" rows="3" class="w-full px-3 py-2 border rounded"
                                th:text="${review.comment}"></textarea>
                            <button type="submit" class="px-3 py-1 border rounded">Update</button>
                        </form>
                        <form method="post" th:action="@{/reviews/delete}">
                            <input type="hidden" name="reviewId" th:value="${review.reviewID}">
                            <input type="hidden" name="bookId" th:value="${book.bookID}">
                            <button type="submit" class="px-3 py-1 border rounded">Delete</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${myReview == null}" class="mt-4 bg-white rounded-2xl p-4">
                <form method="post" th:action="@{/reviews/add}" class="space-y-2">
                    <input type="hidden" name="bookId" th:value="${book.bookID}">
                    <div class="flex items-center gap-2">
                        <label class="text-sm">Reviews</label>
                        <div class="star-input flex flex-row-reverse justify-end gap-1">
                            <input type="radio" id="add-star-5" name="rating" value="5" checked>
                            <label for="add-star-5">★</label>
                            <input type="radio" id="add-star-4" name="rating" value="4">
                            <label for="add-star-4">★</label>
                            <input type="radio" id="add-star-3" name="rating" value="3">
                            <label for="add-star-3">★</label>
                            <input type="radio" id="add-star-2" name="rating" value="2">
                            <label for="add-star-2">★</label>
                            <input type="radio" id="add-star-1" name="rating" value="1">
                            <label for="add-star-1">★</label>
                        </div>
                    </div>
                    <textarea name="content" rows="3" class="w-full px-3 py-2 border rounded"
                        placeholder="Enter your review..."></textarea>
                    <button type="submit" class="px-4 py-2 rounded bg-[#F37021] text-white">Submit Review</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
