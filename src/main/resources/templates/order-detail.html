<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-[#f8f6f1] text-[#1a1410]">
<div class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold">Chi tiết đơn hàng</h1>
        <a th:href="@{/orders}" class="text-sm underline">Quay lại đơn hàng</a>
    </div>

    <div th:if="${orderMessage}" class="mb-4 rounded-xl px-4 py-3 text-sm"
         style="background-color: rgba(22, 163, 74, 0.12); color: #166534;" th:text="${orderMessage}"></div>

    <div class="bg-white rounded-2xl p-6">
        <div class="flex justify-between">
            <div>
                <div class="font-semibold" th:text="${order.orderID}">ORDER-ID</div>
                <div class="text-sm text-gray-600" th:text="${order.orderStatus}">Status</div>
            </div>
            <div class="text-sm" th:text="${order.totalAmount}">0</div>
        </div>
        <div class="mt-4 space-y-2">
            <div th:each="item : ${items}" class="flex justify-between text-sm">
                <span th:text="${item.book.title}">Tên sách</span>
                <span th:text="${item.quantity}">1</span>
            </div>
        </div>

        <form method="post" th:action="@{/orders/{id}/cancel(id=${order.orderID})}" class="mt-4">
            <button type="submit" class="px-4 py-2 rounded border">Hủy đơn hàng</button>
        </form>
    </div>
</div>
</body>
</html>
