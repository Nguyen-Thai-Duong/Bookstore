<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Bookstore</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>User Details</h2>

        <div class="card">
            <div class="card-body">
                <p><strong>ID:</strong> <span th:text="${user.id}"></span></p>
                <p><strong>Full Name:</strong> <span th:text="${user.fullName}"></span></p>
                <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                <p><strong>Phone Number:</strong> <span th:text="${user.phone != null ? user.phone : '-'}"></span></p>
                <p><strong>Address:</strong> <span th:text="${user.address != null ? user.address : '-'}"></span></p>
                <p><strong>Gender:</strong> <span th:text="${user.gender != null ? user.gender : '-'}"></span></p>
                <p><strong>Date of Birth:</strong> <span th:text="${user.dateOfBirth != null ? #temporals.format(user.dateOfBirth, 'dd-MM-yyyy') : '-'}"></span></p>
                <p><strong>Role:</strong> <span th:text="${user.role != null ? user.role.roleName : '-'}"></span></p>
                <p><strong>Status:</strong> <span th:text="${user.status}"></span></p>
                <p><strong>Creation Date:</strong> <span th:text="${user.createdAt}"></span></p>

                <div class="mt-3">
                    <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-warning">Edit</a>
                    <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn btn-danger"
                        data-confirm="Are you sure you want to delete?">Delete</a>
                    <a href="/users" class="btn btn-secondary">Back</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/system-confirm.js"></script>
</body>

</html>
