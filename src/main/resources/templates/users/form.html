<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Người Dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Bookstore</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 th:text="${user.id != null ? 'Chỉnh Sửa Người Dùng' : 'Thêm Người Dùng Mới'}">Form Người Dùng</h2>

        <form th:action="@{/users}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{createdAt}">

            <div class="mb-3">
                <label for="fullName" class="form-label">Họ Tên *</label>
                <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Mật Khẩu *</label>
                <input type="password" class="form-control" id="password" th:field="*{password}"
                    th:required="${user.id == null}" placeholder="Để trống nếu không đổi mật khẩu">
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Số Điện Thoại</label>
                <input type="text" class="form-control" id="phone" th:field="*{phone}">
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Địa Chỉ</label>
                <textarea class="form-control" id="address" th:field="*{address}" rows="2"></textarea>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Trạng Thái</label>
                <select class="form-select" id="status" th:field="*{status}">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="role" class="form-label">Vai Trò</label>
                <select class="form-select" id="role" th:field="*{role.id}" required>
                    <option value="">-- Chọn vai trò --</option>
                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.roleName}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Lưu</button>
            <a href="/users" class="btn btn-secondary">Hủy</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
