<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Search Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-brown: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
            --price: #d0021b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .page-main {
            display: block;
            margin-bottom: 30px;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .panel-body {
            padding: 14px;
        }

        .results-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 2px solid var(--vb-brown);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .results-head h1 {
            font-size: 20px;
            color: var(--vb-brown);
            text-transform: uppercase;
        }

        .results-meta {
            color: #666;
            margin-bottom: 14px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 14px;
        }

        .result-card {
            display: block;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(243, 112, 33, 0.95);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 999px;
            text-transform: uppercase;
        }

        .result-cover {
            width: 120px;
            height: 175px;
            margin: 18px auto 10px;
            border-radius: 4px;
            overflow: hidden;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-cover .no-img-icon {
            color: #ccc;
        }

        .result-title {
            font-size: 13px;
            font-weight: 500;
            color: #0066cc;
            margin-bottom: 4px;
            height: 36px;
            overflow: hidden;
            line-height: 1.35;
            display: block;
        }

        .result-author {
            color: #888;
            font-size: 11px;
            height: 16px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .result-price {
            color: var(--price);
            font-size: 14px;
            font-weight: 700;
        }

        .result-stock {
            margin-top: 6px;
            font-size: 11px;
            color: #666;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }

        @media (max-width: 640px) {
            .results-grid {
                grid-template-columns: repeat(2, minmax(130px, 1fr));
            }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/site-header :: siteHeader('search')}"></div>

    <main class="container page-main">
        <section class="panel">
            <div class="panel-body">
                <div class="results-head">
                    <h1>Search Results</h1>
                    <a th:href="@{/}" style="font-size: 11px; text-decoration: none; color: #0066cc;">Back to home</a>
                </div>

                <div class="results-meta" th:if="${query != null and !query.isBlank()}"
                    th:text="|${totalResults} results for &quot;${query}&quot;|">0 results</div>

                <p th:if="${query == null or query.isBlank()}" class="empty-state">
                    Enter a keyword to search books and stationery.
                </p>

                <p th:if="${query != null and !query.isBlank() and #lists.isEmpty(results)}" class="empty-state">
                    No results found.
                </p>

                <div th:if="${!#lists.isEmpty(results)}" class="results-grid">
                    <a th:each="item : ${results}" class="result-card" th:href="${item.url}">
                        <div class="product-badge" th:text="${item.typeName}">Book</div>
                        <div class="result-cover">
                            <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}" th:src="${item.imageUrl}"
                                th:alt="${item.title}">
                            <div th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}" class="no-img-icon">
                                <i data-lucide="package" size="40"></i>
                            </div>
                        </div>
                        <span class="result-title" th:text="${item.title}">Title</span>
                        <p class="result-author" th:text="${item.author}">Author</p>
                        <p class="result-price"
                            th:text="${item.price != null ? #numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' VND' : '0 VND'}">
                            0 VND
                        </p>
                        <p class="result-stock"
                            th:text="${item.stock != null and item.stock > 0 ? 'Available: ' + item.stock : 'Out of stock'}">
                            Available: 0
                        </p>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
