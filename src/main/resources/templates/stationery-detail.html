<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Stationery Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #F37021; --bg: #f8fafc; --text: #1f2937; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }
        .detail-container { max-width: 1240px; width: 100%; margin: 0 auto; padding: 0 12px; }
        .content-wrap { display: grid; gap: 24px; margin: 10px auto 28px; }
        .crumbs { display: flex; align-items: center; gap: 8px; color: #64748b; font-size: 13px; }
        .crumbs a { text-decoration: none; color: #64748b; }
        .crumbs a:hover { color: #d97706; }
        .product-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; overflow: hidden; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05); }
        .product-grid { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; }
        .product-image-col { background: #f8fafc; border-right: 1px solid #f1f5f9; padding: 28px 20px; display: flex; justify-content: center; align-items: center; }
        .image-wrap { width: min(100%, 360px); height: 520px; position: relative; background: #fff; border-radius: 14px; overflow: hidden; }
        .product-image { width: 100%; height: 100%; object-fit: contain; box-shadow: 0 18px 32px rgba(0, 0, 0, 0.18); transition: transform .25s ease; }
        .product-image:hover { transform: scale(1.02); }
        .stock-badge { position: absolute; top: 10px; right: 10px; padding: 6px 10px; border-radius: 999px; color: #fff; font-size: 11px; font-weight: 700; box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); }
        .stock-badge.in { background: #16a34a; }
        .stock-badge.out { background: #dc2626; }
        .product-info-col { padding: 30px 34px; display: grid; gap: 16px; align-content: start; }
        .product-title { font-size: 36px; line-height: 1.2; color: #111827; font-weight: 800; }
        .meta-rows { display: grid; gap: 8px; background: #fcfcfd; border: 1px solid #edf2f7; border-radius: 12px; padding: 10px 12px; }
        .meta-row { display: flex; align-items: baseline; border-bottom: 1px solid #eef2f6; padding-bottom: 6px; color: #475569; }
        .meta-row:last-child { border-bottom: none; }
        .meta-label { width: 130px; flex-shrink: 0; font-weight: 600; color: #6b7280; }
        .product-price { font-size: 40px; font-weight: 800; color: #111827; }
        .price-unit { font-size: 20px; color: #6b7280; }
        .btn-primary { border: none; background: linear-gradient(135deg, #F37021 0%, #FF8A3D 100%); color: #fff; border-radius: 12px; font-weight: 800; padding: 12px 18px; cursor: pointer; box-shadow: 0 8px 20px rgba(243, 112, 33, 0.35); text-decoration: none; }
        .btn-outline { border: 2px solid #e5e7eb; background: #fff; color: #4b5563; border-radius: 12px; font-weight: 700; padding: 11px 18px; text-decoration: none; }
        .section-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 22px; margin-bottom: 20px; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 14px; }
        .review-card { border: 1px solid #f1f5f9; background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .star-input input { display: none; }
        .star-input label { color: #e5e7eb; cursor: pointer; font-size: 22px; }
        .star-input input:checked~label, .star-input label:hover, .star-input label:hover~label { color: #f59e0b; }
        @media (max-width: 1024px) { .product-grid { grid-template-columns: 1fr; } .product-image-col { border-right: none; border-bottom: 1px solid #f1f5f9; } }
    </style>
</head>

<body>
    <div th:replace="~{fragments/site-header :: siteHeader('stationery')}"></div>

    <div class="detail-container content-wrap">
        <nav class="crumbs">
            <a th:href="@{/}">Home</a> <span>/</span>
            <a th:href="@{/stationery}">Stationery</a> <span>/</span>
            <span style="color:#1f2937;font-weight:600;" th:text="${item.title}">Details</span>
        </nav>

        <section class="product-card">
            <div class="product-grid">
                <div class="product-image-col">
                    <div class="image-wrap">
                        <img class="product-image" th:src="${item.imageUrl != null and !item.imageUrl.isEmpty() ? item.imageUrl : 'https://via.placeholder.com/500x620?text=No+Image'}" th:alt="${item.title}">
                        <span class="stock-badge in" th:if="${item.stock != null and item.stock > 0}" th:text="${'IN STOCK: ' + item.stock}">IN STOCK</span>
                        <span class="stock-badge out" th:if="${item.stock == null or item.stock <= 0}">OUT OF STOCK</span>
                    </div>
                </div>

                <div class="product-info-col">
                    <h1 class="product-title" th:text="${item.title}">Item Name</h1>
                    
                    <div class="meta-rows">
                        <div class="meta-row">
                            <span class="meta-label">Brand:</span>
                            <span class="meta-value" th:text="${item.author != null and !item.author.isBlank() ? item.author : 'N/A'}">Brand</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Category:</span>
                            <span class="meta-value" th:text="${item.category != null ? item.category.name : 'N/A'}">Category</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Dimensions:</span>
                            <span class="meta-value" th:text="${item.widthCm != null ? item.widthCm + 'x' + item.heightCm + 'x' + item.thicknessCm + ' cm' : 'N/A'}">N/A</span>
                        </div>
                    </div>

                    <div class="price-block mt-4">
                        <div class="product-price">
                            <span th:text="${item.price != null ? #numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') : '0'}">0</span>
                            <small class="price-unit">VND</small>
                        </div>
                    </div>

                    <div th:if="${session.loggedInUser != null and item.stock > 0}" class="action-row mt-6">
                        <form method="post" th:action="@{/cart/add}" class="flex gap-4">
                            <input type="hidden" name="bookId" th:value="${item.id}">
                            <input type="number" name="quantity" value="1" min="1" th:attr="max=${item.stock}" class="w-16 border rounded-lg text-center">
                            <button class="btn-primary" type="submit">ADD TO CART</button>
                        </form>
                    </div>

                    <div th:if="${session.loggedInUser == null}" class="mt-6">
                        <a th:href="@{/login}" class="btn-primary">LOGIN TO BUY</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-card">
            <h2 class="section-title">Description</h2>
            <p th:text="${item.description != null ? item.description : 'No description available.'}">Description</p>
        </section>

        <section class="section-card">
            <h2 class="section-title">Reviews</h2>
            <div th:if="${#lists.isEmpty(reviews)}" class="text-gray-500">No reviews yet for this item.</div>
            <div th:each="review : ${reviews}" class="review-card">
                <div class="flex justify-between">
                    <strong th:text="${review.user.fullName}">User</strong>
                    <span class="text-yellow-500" th:each="i : ${#numbers.sequence(1, review.rating)}">&#9733;</span>
                </div>
                <p class="mt-2 text-gray-600" th:text="${review.comment}">Comment</p>
            </div>
        </section>
    </div>

    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>
</body>
</html>
