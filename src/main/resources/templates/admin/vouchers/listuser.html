<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Select Customer</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-bg: #f8f6f1;
            --color-text: #1a1410;
            --color-border: #e5e0d8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }
    </style>
</head>

<body class="h-full overflow-auto">
    <div class="flex min-h-full w-full">
        <!-- Sidebar -->
        <aside class="sidebar w-64 text-white flex flex-col fixed left-0 top-0 h-full">
            <div class="p-6 border-b border-white/20">
                <h1 class="font-bold text-lg">BookNest</h1>
                <p class="text-xs opacity-75">Admin Dashboard</p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="/admin" class="sidebar-item block px-4 py-3 rounded-lg">Dashboard</a>
                <a href="/admin/vouchers" class="sidebar-item active block px-4 py-3 rounded-lg bg-white/20">Voucher Management</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64">
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Select Customer</h2>
                        <p class="text-sm text-gray-500">Send voucher <span class="font-bold text-brown-600" th:text="${voucher.code}"></span> to a customer</p>
                    </div>
                    <a href="/admin/vouchers" class="text-gray-600 hover:text-gray-900 font-medium">Cancel</a>
                </div>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase">Customer Name</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase">Email</th>
                                <th class="px-6 py-4 text-center text-xs font-semibold text-gray-600 uppercase">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr th:each="user : ${users}" class="hover:bg-gray-50">
                                <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${user.fullName}"></td>
                                <td class="px-6 py-4 text-sm text-gray-600" th:text="${user.email}"></td>
                                <td class="px-6 py-4 text-center">
                                    <form th:action="@{/admin/sendmail/send-voucher}" method="post">
                                        <input type="hidden" name="userId" th:value="${user.id}" />
                                        <input type="hidden" name="voucherId" th:value="${voucher.id}" />
                                        <button type="submit" class="btn-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition">
                                            Send Now
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${users.empty}" class="p-8 text-center text-gray-500">
                        No customers found in the system.
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
