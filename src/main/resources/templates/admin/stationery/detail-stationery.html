<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.title} + ' - Stationery Details - BookNest'"></title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar w-64 text-white flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/20">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">BookNest</h1>
                        <p class="text-xs text-white/70">Admin Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-2">
                <a href="/admin" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <span>Dashboard</span>
                </a>
                <a href="/admin/books" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <span>Book Management</span>
                </a>
                <a href="/admin/stationery" class="sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <span>Stationery </span>
                </a>
                <a href="/admin/categories" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <span>Category</span>
                </a>
                <a href="/admin/users" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <span>User</span>
                </a>
                <a href="/admin/orders" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <span>Order</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <!-- Header -->
                <div class="mb-8 flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">Stationery Details</h1>
                        <p class="text-gray-600 mt-1">Detailed stationery information</p>
                    </div>
                    <div class="flex gap-3">
                        <a th:href="@{/admin/stationery/edit/{id}(id=${item.id})}"
                            class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition font-medium">
                            Edit
                        </a>
                        <a href="/admin/stationery"
                            class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                            Back
                        </a>
                    </div>
                </div>

                <!-- Details Card -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="md:flex">
                        <!-- Image -->
                        <div class="md:w-1/3 bg-gray-100 p-8 flex items-center justify-center">
                            <img th:if="${item.imageUrl != null && !item.imageUrl.isEmpty()}" th:src="${item.imageUrl}"
                                th:alt="${item.title}" class="max-w-full max-h-96 rounded-lg shadow-md object-cover">
                            <div th:unless="${item.imageUrl != null && !item.imageUrl.isEmpty()}"
                                class="w-64 h-96 bg-gray-200 rounded-lg flex items-center justify-center text-gray-400">
                                No Image
                            </div>
                        </div>

                        <!-- Information -->
                        <div class="md:w-2/3 p-8">
                            <h2 class="text-2xl font-bold text-gray-900 mb-6" th:text="${item.title}">Item Name</h2>

                            <div class="space-y-4">
                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">ID:</div>
                                    <div class="flex-1 text-gray-600" th:text="${item.id}"></div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Brand:</div>
                                    <div class="flex-1 text-gray-600" th:text="${item.author}"></div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Price:</div>
                                    <div class="flex-1 font-bold text-green-600" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Stock:</div>
                                    <div class="flex-1 text-gray-600" th:text="${item.stock}"></div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Category:</div>
                                    <div class="flex-1 text-gray-600" th:text="${item.category.name}"></div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Created At:</div>
                                    <div class="flex-1 text-gray-600" th:text="${item.createdAt != null ? #temporals.format(item.createdAt, 'dd/MM/yyyy HH:mm') : 'N/A'}"></div>
                                </div>

                                <div class="flex items-start pt-2">
                                    <div class="w-40 font-semibold text-gray-700">Description:</div>
                                    <div class="flex-1 text-gray-600 whitespace-pre-wrap" th:text="${item.description}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
