<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Stationery </title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
            --color-surface: #ffffff;
            --color-text: #1a1410;
            --color-border: #e5e0d8;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 90, 60, 0.3);
        }

        .table-row {
            transition: background-color 0.2s;
        }

        .table-row:hover {
            background-color: rgba(139, 90, 60, 0.05);
        }
    </style>
</head>

<body class="h-full overflow-auto" style="background-color: var(--color-bg);">
    <div class="flex min-h-full w-full">
        <!-- Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar(activePage='stationery')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Stationery Management</h2>
                        <p class="text-sm text-gray-500">All Stationery List in the system</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <form method="post" action="/logout">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                                Logout
                            </button>
                        </form>
                        <a href="/admin/stationery/new" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                            + Add New Item
                        </a>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="p-8">
                <div class="bg-white rounded-lg shadow-sm">
                    <!-- Search Bar -->
                    <div class="p-6 border-b border-gray-200">
                        <form action="/admin/stationery" method="get" class="flex gap-4">
                            <input type="text" name="name" th:value="${param.name}" placeholder="Search by name..."
                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brown-500">
                            <input type="text" name="brand" th:value="${param.brand}" placeholder="Search by brand..."
                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brown-500">
                            <button type="submit"
                                class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                Search
                            </button>
                        </form>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        ID</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Item Name</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Brand</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Price</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Stock</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Category</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr th:each="item : ${stationeryList}" class="table-row">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${item.id}">1</td>
                                    <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${item.title}">Item title</td>
                                    <td class="px-6 py-4 text-sm text-gray-600" th:text="${item.author}">Brand</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold"
                                        style="color: var(--color-primary);"
                                        th:text="${item.price != null ? #numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' VND' : 'N/A'}">
                                        0 VND</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                                        <span class="px-3 py-1 rounded-full text-xs font-semibold"
                                            th:classappend="${item.stock > 10 ? 'bg-green-100 text-green-800' : (item.stock > 0 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800')}"
                                            th:text="${item.stock}">0</span>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-600"
                                        th:text="${item.category != null ? item.category.name : 'N/A'}">Category</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm space-x-2">
                                        <a th:href="@{/admin/stationery/{id}(id=${item.id})}"
                                            class="inline-block px-3 py-1 bg-cyan-500 text-white rounded hover:bg-cyan-600 transition">
                                            View
                                        </a>
                                        <a th:href="@{/admin/stationery/edit/{id}(id=${item.id})}"
                                            class="inline-block px-3 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600 transition">
                                            Edit
                                        </a>
                                        <a th:href="@{/admin/stationery/delete/{id}(id=${item.id})}"
                                            data-confirm="Are you sure you want to delete this item?"
                                            class="inline-block px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 transition">
                                            Delete
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(stationeryList)}" class="p-12 text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                        <p class="text-gray-500 text-lg">No stationery items in the system</p>
                        <a href="/admin/stationery/new"
                            class="mt-4 inline-block btn-primary text-white px-6 py-2 rounded-lg">
                            Add First Item
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/system-confirm.js"></script>
</body>

</html>
