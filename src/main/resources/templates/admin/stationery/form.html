<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.id != null ? 'Edit Stationery' : 'Add New Stationery'} + ' - BookNest'"></title>

    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body class="bg-gray-50 h-full overflow-auto" style="background-color: var(--color-bg);">
<div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('stationery')}"></div>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto ml-64">
        <div class="p-8">

            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900"
                    th:text="${item.id != null ? 'Edit Stationery' : 'Add New Stationery'}">
                </h1>
                <p class="text-gray-600 mt-1">Manage your office and school supplies</p>
            </div>

            <!-- Form -->
            <div class="bg-white rounded-xl shadow-sm p-8">
                <form th:action="@{/admin/stationery/save}" method="post"
                      enctype="multipart/form-data" th:object="${item}">

                    <input type="hidden" th:field="*{id}" />
                    <input type="hidden" th:field="*{stock}" />

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Item Name *</label>
                            <input type="text" th:field="*{title}" required
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500"
                                   th:classappend="${#fields.hasErrors('title')} ? 'border-red-500' : ''"
                                   placeholder="Enter Item Name">
                            <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-2">Brand *</label>
                            <input type="text" th:field="*{author}" required
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500"
                                   th:classappend="${#fields.hasErrors('author')} ? 'border-red-500' : ''"
                                   placeholder="Enter Brand Name">
                            <p th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-2">Category *</label>
                            <select th:field="*{category.id}" required
                                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500"
                                    th:classappend="${#fields.hasErrors('category')} ? 'border-red-500' : ''">
                                <option value="">-- Select Category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}" th:text="${cat.name}">
                                </option>
                            </select>
                            <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Price (VND)</label>
                            <input type="number" th:field="*{price}" min="1000" step="1000"
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500"
                                   th:classappend="${#fields.hasErrors('price')} ? 'border-red-500' : ''"
                                   placeholder="1000">
                            <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-red-500 text-xs mt-1"></p>
                        </div>

                        <!-- Image from URL -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Image from URL</label>
                            <input type="url" th:field="*{imageUrl}"
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500"
                                   placeholder="https://example.com/image.jpg">
                            <p class="text-xs text-gray-500 mt-2">Paste an image URL here or upload a file from your device below.</p>
                        </div>

                        <!-- Image from File -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Upload Image</label>
                            <input type="file" name="imageFile" accept="image/*"
                                   class="w-full px-4 py-3 border rounded-lg bg-white focus:ring-2 focus:ring-orange-500">
                            <p class="text-xs text-gray-500 mt-2">If both URL and file are provided, the uploaded file will be used.</p>
                            <div th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}" class="mt-4">
                                <p class="text-sm font-medium text-gray-700 mb-2">Current image:</p>
                                <img th:src="${item.imageUrl}" alt="Item Image" class="h-40 rounded-lg border"
                                     onerror="this.style.display='none'">
                            </div>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Description</label>
                            <textarea th:field="*{description}" rows="4"
                                      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500"
                                      placeholder="Enter Item Description..."></textarea>
                        </div>

                    </div>

                    <!-- Buttons -->
                    <div class="flex justify-end space-x-4 mt-8 pt-6 border-t">
                        <a href="/admin/stationery" class="px-6 py-3 bg-gray-100 rounded-lg hover:bg-gray-200 transition font-medium">Cancel</a>

                        <button type="submit" class="px-6 py-3 text-white rounded-lg transition font-medium"
                                style="background: linear-gradient(135deg, var(--color-primary), #D95F14);">
                            <span th:text="${item.id != null ? 'Update' : 'Add Item'}">Save</span>
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </main>

</div>
</body>

</html>
