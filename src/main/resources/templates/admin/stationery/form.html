<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.id != null ? 'Edit Stationery' : 'Add New Stationery'} + ' - BookNest'"></title>

    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body class="bg-gray-50">
<div class="flex h-screen overflow-hidden">

    <!-- ✅ Sidebar -->
    <aside class="sidebar w-64 text-white flex flex-col shadow-2xl">
        <div class="p-6 border-b border-white/20">
            <h1 class="text-xl font-bold">BookNest</h1>
            <p class="text-xs text-white/70">Admin Dashboard</p>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <a href="/admin" class="sidebar-item block px-4 py-3 rounded-lg">Dashboard</a>
            <a href="/admin/books" class="sidebar-item block px-4 py-3 rounded-lg">Books</a>
            <a href="/admin/categories" class="sidebar-item block px-4 py-3 rounded-lg">Category</a>
            <a href="/admin/stationery" class="sidebar-item active block px-4 py-3 rounded-lg">Stationery</a>
        </nav>
    </aside>

    <!-- ✅ Main -->
    <main class="flex-1 overflow-y-auto">
        <div class="p-8">

            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900"
                    th:text="${item.id != null ? 'Edit Stationery' : 'Add New Stationery'}">
                </h1>
                <p class="text-gray-600 mt-1">Manage your office and school supplies</p>
            </div>

            <!-- Form -->
            <div class="bg-white rounded-xl shadow-sm p-8">
                <form th:action="@{/admin/stationery/save}" method="post"
                      enctype="multipart/form-data" th:object="${item}">

                    <input type="hidden" th:field="*{id}" />
                    <!-- Hidden field for stock to preserve existing value or set 0 for new -->
                    <input type="hidden" th:field="*{stock}" />

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Item Name *</label>
                            <input type="text" th:field="*{title}" required
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-brown-500">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-2">Brand *</label>
                            <input type="text" th:field="*{author}" required
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-brown-500">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-2">Category *</label>
                            <select th:field="*{category.id}" required
                                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-brown-500">
                                <option value="">-- Select Category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}" th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Price</label>
                            <input type="number" th:field="*{price}" min="0"
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-brown-500">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Image</label>
                            <input type="file" name="imageFile"
                                   class="w-full px-4 py-3 border rounded-lg bg-white">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold mb-2">Description</label>
                            <textarea th:field="*{description}" rows="4"
                                      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-brown-500"></textarea>
                        </div>

                    </div>

                    <!-- Buttons -->
                    <div class="flex justify-end space-x-4 mt-8 pt-6 border-t">
                        <a href="/admin/stationery"
                           class="px-6 py-3 bg-gray-100 rounded-lg">Cancel</a>

                        <button type="submit"
                                class="px-6 py-3 text-white rounded-lg"
                                style="background: linear-gradient(135deg, var(--color-primary), #a0522d);">
                            Save
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </main>

</div>
</body>
</html>
