<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Quản Lý Đơn Hàng</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
            --color-surface: #ffffff;
            --color-text: #1a1410;
            --color-border: #e5e0d8;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 90, 60, 0.3);
        }

        .table-row {
            transition: background-color 0.2s;
        }

        .table-row:hover {
            background-color: rgba(139, 90, 60, 0.05);
        }

        .status-layout {
            display: grid;
            grid-template-columns: 104px 220px;
            align-items: center;
            column-gap: 8px;
        }

        .status-badge {
            width: 104px;
            text-align: center;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .status-editor {
            width: 220px;
            min-height: 30px;
        }

        .status-editor form {
            width: 100%;
        }

        .status-select {
            width: 130px;
        }

        .status-placeholder {
            width: 220px;
            min-height: 30px;
        }
    </style>
</head>

<body class="h-full overflow-auto" style="background-color: var(--color-bg);">
    <div class="flex min-h-full w-full">
        <!-- Sidebar -->
        <aside class="sidebar w-64 text-white flex flex-col fixed left-0 top-0 h-full">
            <div class="p-6 border-b border-white/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg">BookNest</h1>
                        <p class="text-xs opacity-75">Admin Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-2">
                <a href="/admin" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-3m0 0l7-4 7 4M5 9v7a1 1 0 001 1h12a1 1 0 001-1V9m-9 16l-7-4m0 0V5m7 4l7-4" />
                    </svg>
                    <span>Dashboard</span>
                </a>

                <a href="/admin/books"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span>Quản lý sách</span>
                </a>

                <a href="/admin/categories"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                    <span>Danh mục</span>
                </a>

                <a href="/admin/users"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span>Người dùng</span>
                </a>

                <a href="/admin/vouchers"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                    </svg>
                    <span>Voucher</span>
                </a>

                <a href="/admin/reviews"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h8M8 14h5m-9 6l3.6-3.6A2 2 0 003 15V6a2 2 0 012-2h14a2 2 0 012 2v9a2 2 0 01-2 2H9a2 2 0 00-1.4.6L4 21z" />
                    </svg>
                    <span>Review</span>
                </a>

                <a href="/admin/orders"
                    class="sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span>Đơn hàng</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/20">
                <div class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">Admin</p>
                        <p class="text-xs opacity-75">booknest@admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Quản Lý Đơn Hàng</h2>
                        <p class="text-sm text-gray-500">Danh sách đơn hàng trong hệ thống</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <form method="post" action="/logout">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                                Đăng xuất
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="p-8">
                <div th:if="${orderSuccess}"
                    class="mb-4 rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-green-700"
                    th:text="${orderSuccess}"></div>
                <div th:if="${orderError}"
                    class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700"
                    th:text="${orderError}"></div>
                <div class="bg-white rounded-lg shadow-sm">
                    <!-- Filters -->
                    <div class="p-6 border-b border-gray-200">
                        <form action="/admin/orders/search" method="get" class="flex gap-4">
                            <select name="status"
                                class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brown-500">
                                <option value="">Tất cả trạng thái</option>
                                <option value="Pending">Chờ xử lý</option>
                                <option value="Xác nhận đơn">Xác nhận đơn</option>
                                <option value="Đang giao">Đang giao</option>
                                <option value="Hoàn thành">Hoàn thành</option>
                                <option value="Đã hủy">Đã hủy</option>
                            </select>
                            <input type="text" name="orderId" placeholder="Tìm theo mã đơn hàng..."
                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brown-500">
                            <button type="submit"
                                class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                Lọc
                            </button>
                        </form>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Mã ĐH</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Ngày Đặt</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Khách Hàng</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Tổng Tiền</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Trạng Thái</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Thao Tác</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr th:each="order : ${orders}" class="table-row">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold"
                                        style="color: var(--color-primary);" th:text="${order.id}">1</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600"
                                        th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">
                                        01/01/2024</td>
                                    <td class="px-6 py-4 text-sm text-gray-900"
                                        th:text="${order.user != null ? order.user.fullName : 'N/A'}">Tên khách hàng
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold"
                                        style="color: var(--color-primary);"
                                        th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ' : '0đ'}">
                                        0đ</td>

                                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                                        <div class="status-layout">
                                            <span class="status-badge px-3 py-1 rounded-full text-xs font-semibold"
                                                th:classappend="${order.status == 'Hoàn thành' ? 'bg-green-100 text-green-800' :
                                                               ((order.status == 'Xác nhận đơn' or order.status == 'Confirmed') ? 'bg-indigo-100 text-indigo-800' :
                                                               ((order.status == 'Đang giao' or order.status == 'Shipping') ? 'bg-blue-100 text-blue-800' :
                                                               ((order.status == 'Đã hủy' or order.status == 'Cancelled' or order.status == 'Canceled') ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800')))}"
                                                th:text="${(order.status == 'Pending' or order.status == 'pending' or order.status == 'Chờ xử lý') ? 'Chờ xử lý' :
                                                         ((order.status == 'Confirmed' or order.status == 'confirmed' or order.status == 'Xác nhận đơn') ? 'Xác nhận đơn' :
                                                         ((order.status == 'Shipping' or order.status == 'shipping' or order.status == 'Đang giao') ? 'Đang giao' :
                                                         ((order.status == 'Completed' or order.status == 'completed' or order.status == 'Delivered' or order.status == 'delivered' or order.status == 'Hoàn thành') ? 'Hoàn thành' :
                                                         ((order.status == 'Cancelled' or order.status == 'Canceled' or order.status == 'cancelled' or order.status == 'canceled' or order.status == 'Đã hủy') ? 'Đã hủy' : order.status))))}">Chờ
                                                xử lý</span>

                                            <div class="status-editor"
                                                th:if="${orderStatusOptions[order.id] != null and #lists.size(orderStatusOptions[order.id]) > 1 and !(order.status == 'Hoàn thành' or order.status == 'Completed' or order.status == 'completed' or order.status == 'Delivered' or order.status == 'delivered') and !(order.status == 'Đã hủy' or order.status == 'Cancelled' or order.status == 'Canceled' or order.status == 'cancelled' or order.status == 'canceled')}">
                                                <form th:action="@{/admin/orders/save}" method="post"
                                                    class="flex items-center gap-2">
                                                    <input type="hidden" name="id" th:value="${order.id}">
                                                    <select name="status"
                                                        class="status-select text-xs px-2 py-1 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brown-500">
                                                        <option th:each="statusOption : ${orderStatusOptions[order.id]}"
                                                            th:value="${statusOption}"
                                                            th:text="${statusOption == 'Pending' ? 'Chờ xử lý' : statusOption}"
                                                            th:selected="${(statusOption == 'Pending' and (order.status == 'Pending' or order.status == 'pending' or order.status == 'Chờ xử lý')) or
                                                                         (statusOption == 'Xác nhận đơn' and (order.status == 'Xác nhận đơn' or order.status == 'Confirmed' or order.status == 'confirmed')) or
                                                                         (statusOption == 'Đang giao' and (order.status == 'Đang giao' or order.status == 'Shipping' or order.status == 'shipping')) or
                                                                         (statusOption == 'Hoàn thành' and (order.status == 'Hoàn thành' or order.status == 'Completed' or order.status == 'completed' or order.status == 'Delivered' or order.status == 'delivered')) or
                                                                         (statusOption == 'Đã hủy' and (order.status == 'Đã hủy' or order.status == 'Cancelled' or order.status == 'Canceled' or order.status == 'cancelled' or order.status == 'canceled'))}">
                                                            Trạng thái
                                                        </option>
                                                    </select>
                                                    <button type="submit"
                                                        class="px-2 py-1 text-xs font-semibold bg-amber-600 text-white rounded-md hover:bg-amber-700 transition">
                                                        Cập nhật
                                                    </button>
                                                </form>
                                            </div>

                                            <div th:if="${orderStatusOptions[order.id] == null or #lists.size(orderStatusOptions[order.id]) <= 1}"
                                                class="status-placeholder"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm space-x-2">
                                        <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                                            class="inline-block px-3 py-1 bg-cyan-500 text-white rounded hover:bg-cyan-600 transition">
                                            Xem
                                        </a>
                                        <a th:href="@{/admin/orders/edit/{id}(id=${order.id})}"
                                            class="inline-block px-3 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600 transition">
                                            Sửa
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(orders)}" class="p-12 text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                        <p class="text-gray-500 text-lg">Chưa có đơn hàng nào</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
