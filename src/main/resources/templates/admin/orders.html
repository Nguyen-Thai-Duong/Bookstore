<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Order Management</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #333333;
            --color-border: #e5e0d8;
            --color-success: #00A859;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(243, 112, 33, 0.32);
        }

        .table-row {
            transition: background-color 0.2s;
        }

        .table-row:hover {
            background-color: rgba(243, 112, 33, 0.08);
        }

        .status-layout {
            display: grid;
            grid-template-columns: 104px 220px;
            align-items: center;
            column-gap: 8px;
        }

        .status-badge {
            width: 104px;
            text-align: center;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .status-editor {
            width: 220px;
            min-height: 30px;
        }

        .status-editor form {
            width: 100%;
        }

        .status-select {
            width: 130px;
        }

        .status-placeholder {
            width: 220px;
            min-height: 30px;
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="h-full overflow-auto" style="background-color: var(--color-bg);">
    <div class="flex min-h-full w-full">
        <!-- Shared Admin Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('orders')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Order Management</h2>
                        <p class="text-sm text-gray-500">List of orders in the system</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <form method="post" action="/logout">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="p-8">
                <div th:if="${orderSuccess}"
                    class="mb-4 rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-green-700"
                    th:text="${orderSuccess}"></div>
                <div th:if="${orderError}"
                    class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700"
                    th:text="${orderError}"></div>
                <div class="bg-white rounded-lg shadow-sm">
                    <!-- Filters -->
                    <div class="p-6 border-b border-gray-200">
                        <form action="/admin/orders/search" method="get" class="flex gap-4">
                            <select name="status"
                                class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                <option value="">All Status</option>
                                <option value="Pending">Pending</option>
                                <option value="Confirmed">Confirmed</option>
                                <option value="Shipping">Shipping</option>
                                <option value="Completed">Completed</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                            <input type="text" name="orderId" placeholder="Search by order code..."
                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                            <button type="submit"
                                class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                Filter
                            </button>
                        </form>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Order Code</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Order Date</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Customer</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Total amount</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Status</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr th:each="order : ${orders}" class="table-row">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold"
                                        style="color: var(--color-primary);" th:text="${order.id}">1</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600"
                                        th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">
                                        01/01/2024</td>
                                    <td class="px-6 py-4 text-sm text-gray-900"
                                        th:text="${order.user != null ? order.user.fullName : 'N/A'}">Customer name
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold"
                                        style="color: var(--color-primary);"
                                        th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' VND' : '0 VND'}">
                                        0 VND</td>

                                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                                        <div class="status-layout">
                                            <span class="status-badge px-3 py-1 rounded-full text-xs font-semibold"
                                                th:classappend="${order.status == 'Completed' ? 'bg-green-100 text-green-800' :
                                                               ((order.status == 'Confirmed' or order.status == 'Confirmed') ? 'bg-indigo-100 text-indigo-800' :
                                                               ((order.status == 'Shipping' or order.status == 'Shipping') ? 'bg-blue-100 text-blue-800' :
                                                               ((order.status == 'Cancelled' or order.status == 'Cancelled' or order.status == 'Canceled') ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800')))}"
                                                th:text="${(order.status == 'Pending' or order.status == 'pending' or order.status == 'Pending') ? 'Pending' :
                                                         ((order.status == 'Confirmed' or order.status == 'confirmed' or order.status == 'Confirmed') ? 'Confirmed' :
                                                         ((order.status == 'Shipping' or order.status == 'shipping' or order.status == 'Shipping') ? 'Shipping' :
                                                         ((order.status == 'Completed' or order.status == 'completed' or order.status == 'Delivered' or order.status == 'delivered' or order.status == 'Completed') ? 'Completed' :
                                                         ((order.status == 'Cancelled' or order.status == 'Canceled' or order.status == 'cancelled' or order.status == 'canceled' or order.status == 'Cancelled') ? 'Cancelled' : order.status))))}">Pending</span>

                                            <div class="status-editor"
                                                th:if="${orderStatusOptions[order.id] != null and #lists.size(orderStatusOptions[order.id]) > 1 and !(order.status == 'Completed' or order.status == 'Completed' or order.status == 'completed' or order.status == 'Delivered' or order.status == 'delivered') and !(order.status == 'Cancelled' or order.status == 'Cancelled' or order.status == 'Canceled' or order.status == 'cancelled' or order.status == 'canceled')}">
                                                <form th:action="@{/admin/orders/save}" method="post"
                                                    class="flex items-center gap-2">
                                                    <input type="hidden" name="id" th:value="${order.id}">
                                                    <select name="status"
                                                        class="status-select text-xs px-2 py-1 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
                                                        <option th:each="statusOption : ${orderStatusOptions[order.id]}"
                                                            th:value="${statusOption}"
                                                            th:text="${statusOption == 'Pending' ? 'Pending' : statusOption}"
                                                            th:selected="${(statusOption == 'Pending' and (order.status == 'Pending' or order.status == 'pending' or order.status == 'Pending')) or
                                                                         (statusOption == 'Confirmed' and (order.status == 'Confirmed' or order.status == 'Confirmed' or order.status == 'confirmed')) or
                                                                         (statusOption == 'Shipping' and (order.status == 'Shipping' or order.status == 'Shipping' or order.status == 'shipping')) or
                                                                         (statusOption == 'Completed' and (order.status == 'Completed' or order.status == 'Completed' or order.status == 'completed' or order.status == 'Delivered' or order.status == 'delivered')) or
                                                                         (statusOption == 'Cancelled' and (order.status == 'Cancelled' or order.status == 'Cancelled' or order.status == 'Canceled' or order.status == 'cancelled' or order.status == 'canceled'))}">
                                                            Status
                                                        </option>
                                                    </select>
                                                    <button type="submit"
                                                        class="px-2 py-1 text-xs font-semibold bg-amber-600 text-white rounded-md hover:bg-amber-700 transition">
                                                        Update
                                                    </button>
                                                </form>
                                            </div>

                                            <div th:if="${orderStatusOptions[order.id] == null or #lists.size(orderStatusOptions[order.id]) <= 1}"
                                                class="status-placeholder"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm space-x-2">
                                        <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                                            class="inline-block px-3 py-1 bg-cyan-500 text-white rounded hover:bg-cyan-600 transition">
                                            View
                                        </a>
                                        <a th:href="@{/admin/orders/edit/{id}(id=${order.id})}"
                                            class="inline-block px-3 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600 transition">
                                            Edit
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(orders)}" class="p-12 text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                        <p class="text-gray-500 text-lg">No orders found</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
