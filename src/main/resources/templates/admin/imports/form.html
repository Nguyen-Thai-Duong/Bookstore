<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Import - BookNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base styles cho Sidebar/Header */
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
            --color-surface: #ffffff;
            --color-text: #1a1410;
            --color-border: #e5e0d8;
        }

        html, body { height: 100%; margin: 0; }
        body { background-color: #f4f7fe; font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; }

        .sidebar { background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background-color: rgba(255, 255, 255, 0.15); }

        /* Styles cho Form Card */
        .modal-card { background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 800px; padding: 0; overflow: hidden; border: 1px solid #e5e7eb; }
        .modal-header-custom { padding: 20px 24px; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; background-color: #5a80f0; color: white; }
        .modal-title-custom { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; margin: 0; }
        .close-btn { color: white; text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.5); padding: 4px 12px; border-radius: 6px; transition: 0.2s; }
        .close-btn:hover { background-color: rgba(255,255,255,0.1); color: white; }

        .modal-body-custom { padding: 24px; }
        .input-label { font-size: 0.8rem; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
        .required { color: #ef4444; }
        .form-control, .form-select { border-radius: 8px; border-color: #e5e7eb; padding: 10px 15px; color: #374151; box-shadow: none !important; }

        .btn-add { background-color: #374151; color: white; border-radius: 8px; font-weight: 500; padding: 10px 20px; border: none; height: 100%; width: 100%; transition: 0.2s;}
        .btn-add:hover { background-color: #1f2937; color: white; }

        .table-container { border: 1px solid #f3f4f6; border-radius: 8px; max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .table-custom { margin: 0; }
        .table-custom thead th { background: #fafafa; color: #6b7280; font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid #f3f4f6; padding: 12px 20px; position: sticky; top: 0; z-index: 1;}
        .table-custom tbody td { vertical-align: middle; padding: 15px 20px; color: #374151; font-weight: 500; border-bottom: 1px solid #f3f4f6; }

        .btn-remove { color: #ef4444; background: none; border: none; cursor: pointer; padding: 0; transition: 0.2s;}
        .btn-remove:hover { color: #b91c1c; transform: scale(1.1); }

        .modal-footer-custom { padding: 20px 24px; border-top: 1px solid #f3f4f6; background: #fafafa; display: flex; justify-content: flex-end; gap: 15px; }
        .btn-cancel { background-color: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; border-radius: 8px; font-weight: 500; padding: 10px 24px; text-decoration: none; transition: 0.2s; }
        .btn-cancel:hover { background-color: #e5e7eb; color: #1f2937; }
        .btn-submit { background-color: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 500; padding: 10px 24px; transition: 0.2s; }
        .btn-submit:hover { background-color: #1d4ed8; }
    </style>
</head>
<body class="h-full overflow-auto">

<div class="flex min-h-full w-full">

    <div th:replace="~{admin/admin_sidebar :: admin_sidebar}"></div>

    <main class="flex-1 ml-64 flex flex-col">
        <div class="p-10 flex justify-center w-full">

            <div class="modal-card">
                <div class="modal-header-custom">
                    <h3 class="modal-title-custom">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 16V8.00002C20.9996 7.64927 20.9071 7.30481 20.7315 7.00116C20.556 6.69751 20.3037 6.44536 20 6.27002L13 2.27002C12.696 2.09446 12.3511 2.00205 12 2.00205C11.6489 2.00205 11.304 2.09446 11 2.27002L4 6.27002C3.69626 6.44536 3.44398 6.69751 3.26846 7.00116C3.09294 7.30481 3.00036 7.64927 3 8.00002V16C3.00036 16.3508 3.09294 16.6952 3.26846 16.9989C3.44398 17.3025 3.69626 17.5547 4 17.73L11 21.73C11.304 21.9056 11.6489 21.998 12 21.998C12.3511 21.998 12.696 21.9056 13 21.73L20 17.73C20.3037 17.5547 20.556 17.3025 20.7315 16.9989C20.9071 16.6952 20.9996 16.3508 21 16ZM12 4.08002L18.43 7.75002L12 11.45L5.57 7.75002L12 4.08002ZM4.99999 9.38002L11 12.83V19.92L4.99999 16.47V9.38002ZM13 19.92V12.83L19 9.38002V16.47L13 19.92Z"></path></svg>
                        Create New Import
                    </h3>
                    <a th:href="@{/admin/imports}" class="close-btn">← Back to List</a>
                </div>
                <div class="modal-body-custom">
                    <div class="row gx-3 align-items-end mb-4">
                        <div class="col-md-7">
                            <div class="input-label">Book <span class="required">*</span></div>
                            <select id="bookSelect" class="form-select">
                                <option value="" disabled selected>Select a book...</option>
                                <option th:each="book : ${books}" th:value="${book.id}" th:text="${book.title}" th:data-price="${book.price}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <div class="input-label">Quantity</div>
                            <input type="number" id="inputQuantity" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-md-2">
                            <button type="button" class="btn-add" onclick="addToList()">+ Add</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="table table-custom">
                            <thead>
                            <tr>
                                <th>Book Name</th>
                                <th class="text-center">Quantity</th>
                                <th class="text-center">Remove</th>
                            </tr>
                            </thead>
                            <tbody id="importListBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="modal-footer-custom">
                    <a th:href="@{/admin/imports}" class="btn-cancel">Cancel</a>
                    <button type="button" class="btn-submit" onclick="submitImport()">Submit Import</button>
                </div>
            </div>

        </div>
    </main>
</div>

<script>
    let importItems = [];

    function addToList() {
        const selectEl = document.getElementById('bookSelect');
        const bookId = selectEl.value;
        if (!bookId) return alert("Please select a book!");

        const bookName = selectEl.options[selectEl.selectedIndex].text;
        const price = parseFloat(selectEl.options[selectEl.selectedIndex].getAttribute('data-price'));
        const quantity = parseInt(document.getElementById('inputQuantity').value);

        // Kiểm tra trùng lặp dựa trên BookID
        const existingItem = importItems.find(item => item.bookId === bookId);
        if (existingItem) {
            existingItem.quantity += quantity;
        } else {
            importItems.push({ bookId, bookName, quantity, price });
        }
        renderTable();
    }

    function removeItem(index) {
        importItems.splice(index, 1);
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('importListBody');
        tbody.innerHTML = "";
        importItems.forEach((item, index) => {
            tbody.innerHTML += `
                    <tr>
                        <td class="font-medium text-gray-700">${item.bookName}</td>
                        <td class="text-center">${item.quantity}</td>
                        <td class="text-center">
                            <button class="btn-remove" onclick="removeItem(${index})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15 4H9V3H15V4ZM6 6H18V21H6V6ZM8 8V19H10V8H8ZM14 8V19H16V8H14ZM4 4H20V6H4V4Z"></path></svg>
                            </button>
                        </td>
                    </tr>
                `;
        });
    }

    function submitImport() {
        if (importItems.length === 0) return alert("List is empty!");

        fetch('/admin/imports/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(importItems)
        }).then(response => {
            if (response.ok) window.location.href = '/admin/imports';
            else alert('Error creating import!');
        });
    }
</script>
</body>
</html>
