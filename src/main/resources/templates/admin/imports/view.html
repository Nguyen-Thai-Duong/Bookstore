<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Details - BookNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base styles cho Sidebar/Header */
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
            --color-surface: #ffffff;
            --color-text: #1a1410;
            --color-border: #e5e0d8;
        }

        html, body { height: 100%; margin: 0; }
        body { background-color: #f4f7fe; font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; }

        .sidebar { background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background-color: rgba(255, 255, 255, 0.15); }

        /* Căn chỉnh lại View Card để nằm giữa không gian main */
        .view-container { display: flex; justify-content: center; width: 100%; }

        .view-card { width: 100%; max-width: 900px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-radius: 8px; background: #fff; overflow: hidden; border: 1px solid #e5e7eb; }

        .view-header { background-color: #5a80f0; color: white; padding: 15px 24px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem; }
        .back-btn { color: white; text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.5); padding: 4px 12px; border-radius: 6px; transition: 0.2s; }
        .back-btn:hover { background-color: rgba(255,255,255,0.1); color: white; }

        /* Bảng thông tin tổng quan */
        .summary-box { background-color: #f8fafc; padding: 20px 24px; border-bottom: 1px solid #e5e7eb; }
        .summary-item { margin-bottom: 8px; font-size: 0.9rem; }
        .summary-label { color: #6b7280; font-weight: 600; display: inline-block; width: 120px; }
        .summary-value { color: #374151; font-weight: 700; }

        /* Badge Status dùng chung từ imports.html */
        .badge-status { border-radius: 20px; padding: 4px 12px; font-weight: 600; font-size: 0.8rem; }
        .bg-pending { background-color: #fef3c7; color: #d97706; }
        .bg-delivered { background-color: #d1fae5; color: #059669; }
        .bg-cancelled { background-color: #fee2e2; color: #dc2626; }

        .table-custom { margin-bottom: 0; }
        .table-custom thead th { background: #fafafa; color: #6b7280; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #e5e7eb; padding: 15px 24px; }
        .table-custom tbody tr { border-bottom: 1px solid #e5e7eb; }
        .table-custom tbody td { vertical-align: middle; padding: 20px 24px; background: #fdfdfd; }

        .product-info { display: flex; align-items: center; }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #e5e7eb; margin-right: 15px; background: #fff; }
        .product-name { font-weight: 600; color: #374151; font-size: 0.95rem; margin-bottom: 4px; display: block; }
        .product-category { font-size: 0.75rem; color: #6b7280; border: 1px solid #d1d5db; padding: 2px 8px; border-radius: 12px; font-weight: 600; display: inline-block; background: #fff; }
        .product-price { font-size: 0.85rem; color: #9ca3af; margin-left: 8px; }

        .quantity-text { font-weight: 700; color: #374151; font-size: 1rem; }
        .subtotal-text { color: #9ca3af; font-weight: 400; font-size: 0.95rem; }

        .total-row { background-color: #f8fafc !important; font-weight: bold; }
        .total-amount { color: #2563eb; font-size: 1.1rem; }
    </style>
</head>
<body class="h-full overflow-auto">

<div class="flex min-h-full w-full">

    <div th:replace="~{admin/admin_sidebar :: admin_sidebar}"></div>

    <main class="flex-1 ml-64 flex flex-col">
        <div class="p-10 view-container">

            <div class="view-card">
                <div class="view-header">
                    <div class="d-flex align-items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        <span th:text="'Import Details #' + ${importReceipt.id}">Import Details #2019</span>
                    </div>
                    <a th:href="@{/admin/imports}" class="back-btn">← Back to List</a>
                </div>

                <div class="summary-box">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="summary-item">
                                <span class="summary-label">Import ID:</span>
                                <span class="summary-value" th:text="'#' + ${importReceipt.id}">#2019</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Username:</span>
                                <span class="summary-value" th:text="${importReceipt.username}">admin</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Date:</span>
                                <span class="summary-value" th:text="${#temporals.format(importReceipt.createdAt, 'dd/MM/yyyy HH:mm')}">13/04/2026</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="summary-item">
                                <span class="summary-label">Status:</span>
                                <span class="badge-status"
                                      th:classappend="${importReceipt.status.name() == 'PENDING' ? 'bg-pending' : (importReceipt.status.name() == 'APPROVED' ? 'bg-delivered' : 'bg-cancelled')}"
                                      th:text="${#strings.capitalize(importReceipt.status.name().toLowerCase())}">Pending</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Total Items:</span>
                                <span class="summary-value" th:text="${importReceipt.totalQuantity} + ' items'">16 items</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Total Amount:</span>
                                <span class="summary-value total-amount" th:text="${#numbers.formatDecimal(importReceipt.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">2.530.000 VND</span>
                            </div>
                        </div>
                    </div>
                </div>

                <table class="table table-custom">
                    <thead>
                    <tr>
                        <th style="width: 60%;">PRODUCT INFO</th>
                        <th class="text-center" style="width: 20%;">ITEMS</th>
                        <th class="text-end" style="width: 20%;">SUBTOTAL</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="detail : ${importReceipt.details}">
                        <td>
                            <div class="product-info">
                                <img th:src="${detail.book.imageUrl}" class="product-img" onerror="this.src='https://via.placeholder.com/60'">
                                <div>
                                    <span class="product-name" th:text="${detail.book.title}">ALICE BLUE - T-SHIRT</span>
                                    <span class="product-category" th:text="${detail.book.category.name}">T-SHIRT (FEMALE)</span>
                                    <span class="product-price" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">145.000 VND</span>
                                </div>
                            </div>
                        </td>
                        <td class="text-center">
                            <span class="quantity-text" th:text="'x' + ${detail.quantity}">x10</span>
                        </td>
                        <td class="text-end">
                            <span class="subtotal-text" th:text="${#numbers.formatDecimal(detail.subtotal, 0, 'COMMA', 0, 'POINT')} + ' VND'">1.450.000 VND</span>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" class="text-end total-row">GRAND TOTAL:</td>
                        <td class="text-end total-row total-amount" th:text="${#numbers.formatDecimal(importReceipt.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">2.530.000 VND</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>

</body>
</html>
