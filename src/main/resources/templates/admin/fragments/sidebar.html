<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <aside th:fragment="adminSidebar(activePage)"
        class="sidebar w-64 text-white flex flex-col fixed left-0 top-0 h-full">
        <style>
            .sidebar {
                background: linear-gradient(135deg, #F37021 0%, #D95F14 100%) !important;
            }
            .sidebar-item {
                transition: all 0.3s ease;
            }
            .sidebar-item:hover,
            .sidebar-item.active {
                background-color: rgba(255, 255, 255, 0.15) !important;
            }

            nav.flex-1.overflow-y-auto {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            nav.flex-1.overflow-y-auto::-webkit-scrollbar { 
                display: none;
            }
        </style>
        
        <div class="p-6 border-b border-white/20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-lg">BookNest</h1>
                    <p class="text-xs opacity-75" 
                       th:text="${session.loggedInUser.role.roleName.equalsIgnoreCase('Admin') ? 'Admin Dashboard' : 'Staff Dashboard'}">
                       Admin Dashboard
                    </p>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            <a href="/admin"
                th:class="${activePage == 'dashboard'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-3m0 0l7-4 7 4M5 9v7a1 1 0 001 1h12a1 1 0 001-1V9m-9 16l-7-4m0 0V5m7 4l7-4" />
                </svg>
                <span>Dashboard</span>
            </a>

            <a href="/admin/books"
                th:class="${activePage == 'books'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <span>Book Management</span>
            </a>

            <a href="/admin/stationery"
                th:class="${activePage == 'stationery'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
                <span>Stationery</span>
            </a>

            <a href="/admin/categories"
                th:class="${activePage == 'categories'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                </svg>
                <span>Category</span>
            </a>

            <a th:if="${session.loggedInUser.role.roleName.equalsIgnoreCase('Admin')}" 
               href="/admin/suppliers"
                th:class="${activePage == 'suppliers'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
                <span>Supplier</span>
            </a>

            <a th:if="${session.loggedInUser.role.roleName.equalsIgnoreCase('Admin')}" 
               href="/admin/users"
                th:class="${activePage == 'users'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span>User</span>
            </a>

            <a th:if="${session.loggedInUser.role.roleName.equalsIgnoreCase('Admin')}" 
               href="/admin/vouchers"
                th:class="${activePage == 'vouchers'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                </svg>
                <span>Voucher</span>
            </a>

            <a href="/admin/reviews"
                th:class="${activePage == 'reviews'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 10h8M8 14h5m-9 6l3.6-3.6A2 2 0 003 15V6a2 2 0 012-2h14a2 2 0 012 2v9a2 2 0 01-2 2H9a2 2 0 00-1.4.6L4 21z" />
                </svg>
                <span>Review</span>
            </a>

            <a href="/admin/orders"
                th:class="${activePage == 'orders'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span>Order</span>
            </a>

            <a th:if="${session.loggedInUser.role.roleName.equalsIgnoreCase('Staff')}" 
               href="/admin/purchase-orders"
                th:class="${activePage == 'purchase-orders'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                <span>Import</span>
            </a>

            <a th:if="${session.loggedInUser.role.roleName.equalsIgnoreCase('Admin')}" 
               href="/admin/purchase-orders/confirm"
                th:class="${activePage == 'confirm-purchase-orders'} ? 'sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3' : 'sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                <span>Confirm Import</span>
            </a>
        </nav>

        <div class="p-4 border-t border-white/20">
            <div class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10">
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium truncate" th:text="${session.loggedInUser.fullName}">Admin</p>
                    <p class="text-xs opacity-75" th:text="${session.loggedInUser.email}">booknest@admin</p>
                </div>
            </div>
        </div>
    </aside>
</body>

</html>
