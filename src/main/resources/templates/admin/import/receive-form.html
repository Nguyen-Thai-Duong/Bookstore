<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Receive Goods - Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('imports')}"></div>

    <main class="ml-64 p-8">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800" th:text="'Inspection for IMP-' + ${importOrder.id}"></h1>
                
                <div class="mt-4 p-4 bg-purple-50 border-l-4 border-purple-500 rounded-r-lg">
                    <div class="flex items-center gap-2 mb-1">
                        <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                        <span class="text-sm font-bold text-purple-800 uppercase tracking-wider">Supplier Info</span>
                    </div>
                    <p class="font-bold text-gray-800" th:text="${importOrder.supplier.supplierName}"></p>
                    <p class="text-sm text-gray-600" th:text="${importOrder.supplier.phone + ' | ' + importOrder.supplier.address}"></p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-8">
                <form th:action="@{/admin/imports/receive/save}" method="post" id="receiveForm" class="space-y-6">
                    <input type="hidden" name="importId" th:value="${importOrder.id}" />
                    
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="px-4 py-3 font-semibold text-gray-700">Product</th>
                                <th class="px-4 py-3 font-semibold text-gray-700 text-center">Ordered Qty</th>
                                <th class="px-4 py-3 font-semibold text-gray-700 w-48">Actual Received Qty</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y">
                            <tr th:each="detail : ${importOrder.details}" class="hover:bg-gray-50">
                                <td class="px-4 py-4 text-gray-800" th:text="${detail.product.title}"></td>
                                <td class="px-4 py-4 text-center text-gray-600 font-bold" th:text="${detail.orderedQuantity}"></td>
                                <td class="px-4 py-4">
                                    <input type="hidden" name="detailIds" th:value="${detail.id}" />
                                    <input type="number" name="receivedQtys" th:value="${detail.orderedQuantity}" 
                                           min="0" th:max="${detail.orderedQuantity}" required 
                                           class="receive-qty-input w-full px-3 py-2 border rounded focus:ring-2 focus:ring-purple-500 outline-none">
                                    <p class="text-[10px] text-red-500 mt-1 hidden error-msg">Cannot exceed ordered quantity</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="pt-6 border-t flex justify-end gap-4">
                        <a href="/admin/imports" class="px-6 py-2 border rounded-lg hover:bg-gray-50 transition">Cancel</a>
                        <button type="submit" class="px-8 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 shadow-lg shadow-purple-200 transition font-bold">
                            Submit Inspection Report
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.querySelectorAll('.receive-qty-input').forEach(input => {
            const max = parseInt(input.getAttribute('max'));
            const errorMsg = input.nextElementSibling;
            input.addEventListener('input', function() {
                const val = parseInt(this.value);
                if (val > max) {
                    this.value = max;
                    errorMsg.classList.remove('hidden');
                    setTimeout(() => errorMsg.classList.add('hidden'), 2000);
                } else if (val < 0) {
                    this.value = 0;
                }
            });
        });
    </script>
</body>
</html>
