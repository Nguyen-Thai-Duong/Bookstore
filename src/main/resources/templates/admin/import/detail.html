<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Import Detail - BookNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar(${activePage})}"></div>

    <main class="ml-64 p-8">
        <div class="max-w-4xl mx-auto" th:with="calculatedTotal=${#aggregates.sum(importOrder.details.![unitPrice * (receivedQuantity != null ? receivedQuantity : orderedQuantity)])}">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800" th:text="'Import IMP-' + ${importOrder.id}"></h1>
                    <p class="text-gray-500 mt-1" th:text="'Created on: ' + ${#temporals.format(importOrder.orderDate, 'dd MMMM yyyy, HH:mm')}"></p>
                </div>
                <div class="text-right">
                    <span th:class="${'px-4 py-2 rounded-lg text-sm font-bold shadow-sm ' + 
                        (importOrder.status == 'Requested' ? 'bg-yellow-100 text-yellow-700' : 
                         importOrder.status == 'Pending' ? 'bg-blue-100 text-blue-700' : 
                         importOrder.status == 'Received' ? 'bg-purple-100 text-purple-700' : 
                         importOrder.status == 'Finalized' ? 'bg-indigo-100 text-indigo-700' : 
                         importOrder.status == 'Completed' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')}"
                          th:text="${importOrder.status}"></span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Supplier Information</h3>
                    <p class="font-bold text-gray-800" th:text="${importOrder.supplier.supplierName}"></p>
                    <p class="text-gray-600 text-sm" th:text="${importOrder.supplier.phone}"></p>
                    <p class="text-gray-600 text-sm" th:text="${importOrder.supplier.address}"></p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Prepared By</h3>
                    <p class="font-bold text-gray-800" th:text="${importOrder.user.fullName}"></p>
                    <p class="text-gray-600 text-sm" th:text="${importOrder.user.email}"></p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-8 border border-gray-100">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Product</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase text-center">Ordered Qty</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase text-center">Received Qty</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase text-right">Unit Price</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase text-right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        <tr th:each="detail : ${importOrder.details}">
                            <td class="px-6 py-4">
                                <p class="font-medium text-gray-800" th:text="${detail.product.title}"></p>
                                <p class="text-xs text-gray-400" th:text="'ID: ' + ${detail.product.id}"></p>
                            </td>
                            <td class="px-6 py-4 text-center text-gray-600" th:text="${detail.orderedQuantity}"></td>
                            <td class="px-6 py-4 text-center font-bold" 
                                th:classappend="${detail.receivedQuantity != null && detail.receivedQuantity != detail.orderedQuantity ? 'text-red-600' : 'text-gray-800'}"
                                th:text="${detail.receivedQuantity != null ? detail.receivedQuantity : '-'}"></td>
                            <td class="px-6 py-4 text-right text-gray-600" th:text="${#numbers.formatDecimal(detail.unitPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                            <td class="px-6 py-4 text-right font-bold text-gray-800" 
                                th:with="actualQty=${detail.receivedQuantity != null ? detail.receivedQuantity : detail.orderedQuantity}"
                                th:text="${#numbers.formatDecimal(detail.unitPrice * actualQty, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                        </tr>
                    </tbody>
                    <tfoot class="bg-gray-50 border-t">
                        <tr>
                            <td colspan="4" class="px-6 py-4 text-right font-bold text-gray-600">Total Amount:</td>
                            <td class="px-6 py-4 text-right text-xl font-black text-orange-600" 
                                th:text="${#numbers.formatDecimal(calculatedTotal, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div th:if="${importOrder.note}" class="bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-xl mb-8">
                <h3 class="text-sm font-bold text-blue-800 mb-1 italic uppercase tracking-widest">Admin Final Note:</h3>
                <p class="text-blue-700" th:text="${importOrder.note}"></p>
            </div>

            <div class="flex justify-end gap-4">
                <a th:href="${activePage == 'confirm-imports' ? '/admin/imports/confirm' : '/admin/imports'}" 
                   class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-white transition">Close</a>
            </div>
        </div>
    </main>
</body>
</html>
