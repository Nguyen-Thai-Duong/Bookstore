<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirm Import - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('confirm-imports')}"></div>

    <main class="ml-64 p-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Import Confirmation & History</h1>
            
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="bg-[#F37021] text-white px-6 py-2 rounded-lg hover:opacity-90 transition font-medium">
                    Logout
                </button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left" id="adminImportTable">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-700">Order ID</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Staff</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Supplier</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-right">Total Amount</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-center">Status</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr th:each="imp : ${imports}" class="hover:bg-gray-50 transition"
                        th:with="actualTotal=${#aggregates.sum(imp.details.![unitPrice * (receivedQuantity != null ? receivedQuantity : orderedQuantity)])}">
                        <td class="px-6 py-4 font-mono text-blue-600 import-id" th:data-id="${imp.id}" th:text="'IMP-' + ${imp.id}"></td>
                        <td class="px-6 py-4 text-gray-800" th:text="${imp.user.fullName}"></td>
                        <td class="px-6 py-4 text-gray-800" th:text="${imp.supplier.supplierName}"></td>
                        <td class="px-6 py-4 font-bold text-orange-600 text-right whitespace-nowrap" 
                            th:text="${#numbers.formatDecimal(actualTotal, 0, 'COMMA', 0, 'POINT') + ' VND'}"></td>
                        <td class="px-6 py-4 text-center">
                            <span th:class="${'px-2 py-1 rounded text-xs font-bold ' + 
                                (imp.status == 'Requested' ? 'bg-yellow-100 text-yellow-700' : 
                                 imp.status == 'Pending' ? 'bg-blue-100 text-blue-700' : 
                                 imp.status == 'Received' ? 'bg-purple-100 text-purple-700' : 
                                 imp.status == 'Finalized' ? 'bg-indigo-100 text-indigo-700' : 
                                 imp.status == 'Completed' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')}"
                                  th:text="${imp.status}"></span>
                        </td>
                        <td class="px-6 py-4">
                            <!-- Sử dụng Flexbox justify-center để căn giữa nhóm nút so với tiêu đề Actions -->
                            <div class="flex justify-center items-center gap-3">
                                <!-- Slot 1: View -->
                                <div class="w-16">
                                    <a th:href="@{'/admin/imports/view/' + ${imp.id}}" 
                                       class="inline-block w-full bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600 text-[11px] font-bold transition text-center">View</a>
                                </div>
                                
                                <!-- Slot 2: Main Action -->
                                <div class="w-20">
                                    <form th:if="${imp.status == 'Requested'}" th:action="@{'/admin/imports/approve/' + ${imp.id}}" method="post" class="block w-full">
                                        <button type="submit" class="w-full bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600 text-[11px] font-bold transition text-center">Approve</button>
                                    </form>
                                    <a th:if="${imp.status == 'Received'}" th:href="@{'/admin/imports/finalize/' + ${imp.id}}" 
                                       class="inline-block w-full bg-indigo-500 text-white px-2 py-1 rounded hover:bg-indigo-600 text-[11px] font-bold transition text-center">Finalize</a>
                                </div>
                                
                                <!-- Slot 3: Cancel Action -->
                                <div class="w-16">
                                    <a th:if="${imp.status == 'Requested' || imp.status == 'Received'}" 
                                       th:href="@{'/admin/imports/cancel/' + ${imp.id}}" 
                                       class="inline-block w-full bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600 text-[11px] font-bold transition text-center">Cancel</a>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            const tbody = document.querySelector('#adminImportTable tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            rows.sort((a, b) => {
                const idA = parseInt(a.querySelector('.import-id').getAttribute('data-id'));
                const idB = parseInt(b.querySelector('.import-id').getAttribute('data-id'));
                return idB - idA;
            });
            rows.forEach(row => tbody.appendChild(row));
        });
    </script>
</body>
</html>
