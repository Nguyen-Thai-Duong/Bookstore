<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Import Management - Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('imports')}"></div>

    <main class="ml-64 p-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">My Import Requests</h1>
            
            <div class="flex gap-3">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="bg-[#F37021] text-white px-6 py-2 rounded-lg hover:opacity-90 transition font-medium">
                        Logout
                    </button>
                </form>
                <a href="/admin/imports/new" class="bg-[#F37021] text-white px-4 py-2 rounded-lg hover:opacity-90 transition font-medium">
                    + Create New Request
                </a>
            </div>
        </div>

        <div th:if="${successMessage}" class="mb-4 p-4 bg-green-100 text-green-700 rounded-lg" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-100 text-red-700 rounded-lg" th:text="${errorMessage}"></div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse" id="importTable">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-700">ID</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Supplier</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Date</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-right whitespace-nowrap">Total Amount</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-center">Status</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr th:each="imp : ${imports}" class="hover:bg-gray-50 transition"
                        th:with="actualTotal=${#aggregates.sum(imp.details.![unitPrice * (receivedQuantity != null ? receivedQuantity : orderedQuantity)])}">
                        <td class="px-6 py-4 text-gray-600 font-mono import-id" th:data-id="${imp.id}" th:text="'IMP-' + ${imp.id}"></td>
                        <td class="px-6 py-4 font-medium text-gray-800" th:text="${imp.supplier.supplierName}"></td>
                        <td class="px-6 py-4 text-gray-600 text-sm" th:text="${#temporals.format(imp.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="px-6 py-4 font-bold text-orange-600 text-right whitespace-nowrap" 
                            th:text="${#numbers.formatDecimal(actualTotal, 0, 'COMMA', 0, 'POINT') + ' VND'}"></td>
                        <td class="px-6 py-4 text-center">
                            <span th:class="${'px-3 py-1 rounded-full text-xs font-bold ' + 
                                (imp.status == 'Requested' ? 'bg-yellow-100 text-yellow-700' : 
                                 imp.status == 'Pending' ? 'bg-blue-100 text-blue-700' : 
                                 imp.status == 'Received' ? 'bg-purple-100 text-purple-700' : 
                                 imp.status == 'Finalized' ? 'bg-indigo-100 text-indigo-700' : 
                                 imp.status == 'Completed' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')}"
                                  th:text="${imp.status}"></span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex justify-center items-center gap-3">
                                <!-- Slot 1: View (Luôn hiển thị) -->
                                <div class="w-16">
                                    <a th:href="@{'/admin/imports/view/' + ${imp.id}}" 
                                       class="inline-block w-full text-blue-600 hover:underline text-sm font-medium text-center">View</a>
                                </div>
                                
                                <!-- Slot 2: Main Action (Report Goods hoặc Stock-in) -->
                                <div class="w-24">
                                    <a th:if="${imp.status == 'Pending'}" 
                                       th:href="@{'/admin/imports/receive/' + ${imp.id}}" 
                                       class="inline-block w-full bg-purple-500 text-white px-2 py-1 rounded hover:bg-purple-600 text-[11px] font-bold transition text-center">Report Goods</a>
                                    
                                    <form th:if="${imp.status == 'Finalized'}" 
                                          th:action="@{'/admin/imports/stock-in/' + ${imp.id}}" method="post" class="block w-full">
                                        <button type="submit" class="w-full bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600 text-[11px] font-bold transition text-center"
                                                onclick="return confirm('Confirm updating stock in database?')">
                                            Stock-in
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            const tbody = document.querySelector('#importTable tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));

            rows.sort((a, b) => {
                const idA = parseInt(a.querySelector('.import-id').getAttribute('data-id'));
                const idB = parseInt(b.querySelector('.import-id').getAttribute('data-id'));
                return idB - idA;
            });

            rows.forEach(row => tbody.appendChild(row));
        });
    </script>
</body>
</html>
