<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Book Management</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #333333;
            --color-border: #e5e0d8;
            --color-success: #00A859;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(243, 112, 33, 0.32);
        }

        .table-row {
            transition: background-color 0.2s;
        }

        .table-row:hover {
            background-color: rgba(243, 112, 33, 0.08);
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="h-full overflow-hidden" style="background-color: var(--color-bg);">
    <div class="flex h-full w-full overflow-hidden">
        <!-- Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('books')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64 overflow-y-auto h-full">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Book Management</h2>
                        <p class="text-sm text-gray-500">All Books List in the system</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <form method="post" action="/logout">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                                Logout
                            </button>
                        </form>
                        <a href="/admin/books/new" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                            + Add New Book
                        </a>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="p-8">
                <div th:if="${bookError}" class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700"
                    th:text="${bookError}"></div>
                <div th:if="${bookSuccess}"
                    class="mb-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-700"
                    th:text="${bookSuccess}"></div>

                <div class="bg-white rounded-lg shadow-sm">
                    <!-- Search Bar -->
                    <div class="p-6 border-b border-gray-200">
                        <form action="/admin/books/search" method="get" class="flex gap-4">
                            <input type="text" name="title" placeholder="Search by book title..."
                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                            <input type="text" name="author" placeholder="Search by author..."
                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                            <button type="submit"
                                class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                Search
                            </button>
                        </form>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        ID</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Book Name</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Author</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">

                                        Price</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Stock</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Category</th>
                                    <th
                                        class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr th:each="book : ${books}" class="table-row">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${book.id}">1
                                    </td>
                                    <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${book.title}">Book
                                        title</td>
                                    <td class="px-6 py-4 text-sm text-gray-600" th:text="${book.author}">Author</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold"
                                        style="color: var(--color-primary);"
                                        th:text="${book.price != null ? #numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT') + ' VND' : 'N/A'}">
                                        0 VND</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                                        <span class="px-3 py-1 rounded-full text-xs font-semibold"
                                            th:classappend="${book.stock > 10 ? 'bg-green-100 text-green-800' : (book.stock > 0 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800')}"
                                            th:text="${book.stock}">0</span>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-600"
                                        th:text="${book.category != null ? book.category.name : 'N/A'}">Category</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm space-x-2">
                                        <a th:href="@{/admin/books/{id}(id=${book.id})}"
                                            class="inline-block px-3 py-1 bg-cyan-500 text-white rounded hover:bg-cyan-600 transition">
                                            View
                                        </a>
                                        <a th:href="@{/admin/books/edit/{id}(id=${book.id})}"
                                            class="inline-block px-3 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600 transition">
                                            Edit
                                        </a>
                                        <a th:href="@{/admin/books/delete/{id}(id=${book.id})}"
                                            data-confirm="Are you sure you want to delete this book?"
                                            class="inline-block px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 transition">
                                            Delete
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(books)}" class="p-12 text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        <p class="text-gray-500 text-lg">No books in the system</p>
                        <a href="/admin/books/new"
                            class="mt-4 inline-block btn-primary text-white px-6 py-2 rounded-lg">
                            Add First Book
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/system-confirm.js"></script>
</body>

</html>
