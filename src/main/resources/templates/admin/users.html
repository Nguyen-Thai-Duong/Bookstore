<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - User Management</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #333333;
            --color-border: #e5e0d8;
            --color-success: #00A859;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(243, 112, 33, 0.32);
        }

        .table-row {
            transition: background-color 0.2s;
        }

        .table-row:hover {
            background-color: rgba(243, 112, 33, 0.08);
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="h-full overflow-auto" style="background-color: var(--color-bg);">
    <div class="flex min-h-full w-full">
        <!-- Shared Admin Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('users')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">User Management</h2>
                        <p class="text-sm text-gray-500">List of users in the system</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <form method="post" action="/logout">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="p-8">
                <!-- Search and Filter Section -->
                <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                    <form action="/admin/users/search" method="get" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                            <input type="text" name="keyword" placeholder="Name or email..."
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-offset-0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                            <select name="status"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-offset-0">
                                <option value="All Status">All Status</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Locked</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
                            <select name="roleId"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-offset-0">
                                <option value="All Roles">All Roles</option>
                                <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.roleName}">
                                </option>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg w-full">
                                Filter
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Actions -->
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-sm text-gray-600">
                            Total: <span class="font-semibold" th:text="${users.size()}">0</span> users
                        </p>
                    </div>
                    <a href="/admin/users/new"
                        class="btn-primary text-white px-6 py-3 rounded-lg flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Add User</span>
                    </a>
                </div>

                <!-- Users Table -->
                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    ID
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Full Name
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Email
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Phone Number
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Role
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Status
                                </th>
                                <th
                                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Creation Date
                                </th>
                                <th
                                    class="px-6 py-4 text-right text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Actions
                                </th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr th:if="${users.empty}">
                                <td colspan="8" class="px-6 py-12 text-center text-gray-500">
                                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                                    </svg>
                                    <p class="text-lg font-medium">No users found</p>
                                </td>
                            </tr>
                            <tr th:each="user : ${users}" class="table-row">
                                <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${user.id}">1</td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center">
                                        <div class="w-10 h-10 rounded-full flex items-center justify-center font-semibold text-white"
                                            style="background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);"
                                            th:text="${#strings.substring(user.fullName, 0, 1)}">
                                            A
                                        </div>
                                        <div class="ml-3">
                                            <p class="text-sm font-medium text-gray-900" th:text="${user.fullName}">
                                                Admin User</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-700" th:text="${user.email}">
                                    admin@example.com</td>
                                <td class="px-6 py-4 text-sm text-gray-700"
                                    th:text="${user.phone != null ? user.phone : 'Not Set'}">0123456789</td>
                                <td class="px-6 py-4">
                                    <span class="px-3 py-1 text-xs font-medium rounded-full"
                                        style="background-color: rgba(243, 112, 33, 0.12); color: var(--color-primary);"
                                        th:text="${user.role != null ? user.role.roleName : 'Not Set'}">
                                        Admin
                                    </span>
                                </td>
                                <td class="px-6 py-4">
                                    <span th:if="${user.status == 'Active'}"
                                        class="px-3 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">
                                        Active
                                    </span>
                                    <span th:if="${user.status == 'Inactive'}"
                                        class="px-3 py-1 text-xs font-medium rounded-full bg-red-100 text-red-800">
                                        Locked
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-700"
                                    th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy') : 'N/A'}">
                                    01/01/2024</td>
                                <td class="px-6 py-4 text-right text-sm font-medium">
                                    <div class="flex justify-end gap-2">
                                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                                            class="text-blue-600 hover:text-blue-800 transition" title="View Details">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                            </svg>
                                        </a>
                                        <a th:href="@{/admin/users/edit/{id}(id=${user.id})}"
                                            class="hover:text-yellow-800 transition"
                                            style="color: var(--color-warning);" title="Edit">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                            </svg>
                                        </a>
                                        <a th:if="${(session.loggedInUser == null or session.loggedInUser.id != user.id) and (user.role == null or user.role.roleName == null or !#strings.equalsIgnoreCase(user.role.roleName, 'admin'))}"
                                            th:href="@{/admin/users/toggle-status/{id}(id=${user.id})}"
                                            th:classappend="${user.status == 'Active' ? 'text-red-600 hover:text-red-800' : 'text-green-600 hover:text-green-800'}"
                                            class="transition" th:title="${user.status == 'Active' ? 'Lock' : 'Unlock'}"
                                            data-confirm="Are you sure you want to change the status?">
                                            <svg th:if="${user.status == 'Active'}" class="w-5 h-5" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                            </svg>
                                            <svg th:if="${user.status == 'Inactive'}" class="w-5 h-5" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
                                            </svg>
                                        </a>
                                        <span
                                            th:if="${!(session.loggedInUser == null or session.loggedInUser.id != user.id) or !(user.role == null or user.role.roleName == null or !#strings.equalsIgnoreCase(user.role.roleName, 'admin'))}"
                                            class="text-gray-300 cursor-not-allowed" title="Protected account">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                            </svg>
                                        </span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/system-confirm.js"></script>
</body>

</html>
