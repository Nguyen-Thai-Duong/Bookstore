<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${supplier.id == null ? 'Add Supplier' : 'Edit Supplier'}">Supplier Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('suppliers')}"></div>

    <main class="ml-64 p-8">
        <div class="max-w-2xl mx-auto">
            <div class="mb-6">
                <a href="/admin/suppliers" class="text-orange-500 hover:underline flex items-center gap-2">
                    ← Back to List
                </a>
                <h1 class="text-2xl font-bold text-gray-800 mt-2" 
                    th:text="${supplier.id == null ? 'Add New Supplier' : 'Edit Supplier'}"></h1>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-8">
                <form th:action="@{/admin/suppliers/save}" th:object="${supplier}" method="post" class="space-y-6">
                    <input type="hidden" th:field="*{id}" />

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Supplier Name</label>
                        <input type="text" th:field="*{supplierName}" required
                               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"
                               placeholder="e.g. Thien Long Group">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
                            <input type="text" th:field="*{phone}"
                                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"
                                   placeholder="e.g. 028 3750 5555">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Address</label>
                        <textarea th:field="*{address}" rows="3"
                                  class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"
                                  placeholder="Enter supplier address..."></textarea>
                    </div>

                    <div class="pt-4 border-t flex justify-end gap-3">
                        <a href="/admin/suppliers" class="px-6 py-2 rounded-lg border hover:bg-gray-50 transition">Cancel</a>
                        <button type="submit" class="px-6 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition">
                            Save Supplier
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
