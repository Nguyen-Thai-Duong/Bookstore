<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Supplier Management - BookNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('suppliers')}"></div>

    <main class="ml-64 p-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Supplier Management</h1>
            <a href="/admin/suppliers/new" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition">
                + Add New Supplier
            </a>
        </div>

        <div th:if="${successMessage}" class="mb-4 p-4 bg-green-100 text-green-700 rounded-lg" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-100 text-red-700 rounded-lg" th:text="${errorMessage}"></div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-700">ID</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Name</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Phone</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Address</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr th:each="s : ${suppliers}" class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 text-gray-600" th:text="${s.id}"></td>
                        <td class="px-6 py-4 font-medium text-gray-800" th:text="${s.supplierName}"></td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.phone}"></td>
                        <td class="px-6 py-4 text-gray-600" th:text="${s.address}"></td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <a th:href="@{'/admin/suppliers/edit/' + ${s.id}}" class="text-blue-600 hover:underline">Edit</a>
                            <a th:href="@{'/admin/suppliers/delete/' + ${s.id}}" 
                               onclick="return confirm('Are you sure you want to delete this supplier?')"
                               class="text-red-600 hover:underline">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
