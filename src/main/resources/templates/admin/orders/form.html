<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Order - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('orders')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64 overflow-y-auto">
            <div class="p-8">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900">Edit Order</h1>
                    <p class="text-gray-600 mt-1">Update order status and information</p>
                </div>

                <!-- Form Card -->
                <div class="bg-white rounded-xl shadow-sm p-8 max-w-3xl">
                    <div th:if="${orderError}"
                        class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700"
                        th:text="${orderError}"></div>
                    <form th:action="@{/admin/orders/save}" method="post" th:object="${order}">
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:field="*{user.id}" />
                        <input type="hidden" th:field="*{orderDate}" />
                        <input type="hidden" th:field="*{totalAmount}" />

                        <div class="space-y-6">
                            <!-- Order Info (Read-only) -->
                            <div class="bg-gray-50 p-6 rounded-lg">
                                <h3 class="text-lg font-semibold text-gray-900 mb-4">Order Information</h3>
                                <div class="grid md:grid-cols-2 gap-4 text-sm">
                                    <div>
                                        <span class="font-semibold text-gray-700">Order code:</span>
                                        <span class="text-gray-600 ml-2" th:text="${order.id}">1</span>
                                    </div>
                                    <div>
                                        <span class="font-semibold text-gray-700">Order date:</span>
                                        <span class="text-gray-600 ml-2"
                                            th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">01/01/2024</span>
                                    </div>
                                    <div>
                                        <span class="font-semibold text-gray-700">Customer:</span>
                                        <span class="text-gray-600 ml-2"
                                            th:text="${order.user != null ? order.user.fullName : 'N/A'}">Customer
                                            name</span>
                                    </div>
                                    <div>
                                        <span class="font-semibold text-gray-700">Total amount:</span>
                                        <span class="text-green-600 font-bold ml-2"
                                            th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' VND' : '0 VND'}">0
                                            VND</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Status -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Order status <span class="text-red-500">*</span>
                                </label>
                                <select th:field="*{status}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                                    <option th:each="statusOption : ${orderStatusChoices}" th:value="${statusOption}"
                                        th:text="${statusOption == 'Pending' ? 'Pending' : statusOption}">
                                        Status
                                    </option>
                                </select>
                                <p class="mt-2 text-sm text-gray-500">Select the current order status</p>
                            </div>

                            <!-- Shipping Address -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Shipping address
                                </label>
                                <textarea th:field="*{shippingAddress}" rows="3"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition resize-none"
                                    placeholder="Enter shipping address..."></textarea>
                            </div>

                            <!-- Order Details Info -->
                            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4"
                                th:if="${order.orderDetails != null && !order.orderDetails.isEmpty()}">
                                <div class="flex items-start">
                                    <svg class="w-5 h-5 text-blue-600 mt-0.5 mr-3" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    <div class="flex-1">
                                        <h4 class="text-sm font-semibold text-blue-900 mb-1">Items in this order</h4>
                                        <ul class="text-sm text-blue-800 space-y-1">
                                            <li th:each="detail : ${order.orderDetails}">
                                                <span
                                                    th:text="${detail.book != null ? detail.book.title : 'N/A'}">Books</span>
                                                <span class="text-blue-600"> x </span>
                                                <span th:text="${detail.quantity}">1</span>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex justify-end space-x-4 mt-8 pt-6 border-t">
                            <a href="/admin/orders"
                                class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                                Cancel
                            </a>
                            <button type="submit" class="px-6 py-3 text-white rounded-lg transition font-medium"
                                style="background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);">
                                Update Order
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
