<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.id != null ? 'Edit Book' : 'Add New Book'} + ' - BookNest'">Book Management - BookNest
    </title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('books')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64 overflow-y-auto">
            <div class="p-8">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900"
                        th:text="${book.id != null ? 'Edit Book' : 'Add New Book'}">Add New Book</h1>
                    <p class="text-gray-600 mt-1">Enter detailed information about the book</p>
                </div>

                <!-- Form Card -->
                <div class="bg-white rounded-xl shadow-sm p-8">
                    <form th:action="@{/admin/books/save}" method="post" enctype="multipart/form-data"
                        th:object="${book}">
                        <input type="hidden" th:field="*{id}" />

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Title -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Book title <span class="text-red-500">*</span>
                                </label>
                                <input type="text" th:field="*{title}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="Enter Book Title">
                            </div>

                            <!-- Author -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Author <span class="text-red-500">*</span>
                                </label>
                                <input type="text" th:field="*{author}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="Enter Author Name">
                            </div>

                            <!-- Price -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Price (VND) <span class="text-red-500">*</span>
                                </label>
                                <input type="number" th:field="*{price}" required min="0" step="1000"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="0">
                            </div>

                            <!-- Quantity -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Stock quantity <span class="text-red-500">*</span>
                                </label>
                                <input type="number" th:field="*{stock}" required min="0"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="0">
                            </div>

                            <!-- Product Type -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Product type
                                </label>
                                <select th:field="*{productTypeId}" id="productTypeSelect"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                                    <option value="">-- Select Product Type --</option>
                                    <option th:each="type : ${productTypes}" th:value="${type.id}"
                                        th:text="${type.name}">
                                        Type</option>
                                </select>
                            </div>

                            <!-- Category -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Category <span class="text-red-500">*</span>
                                </label>
                                <select th:field="*{category.id}" id="categorySelect" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                                    <option value="">-- Select Category --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                        th:attr="data-product-type=${cat.productTypeId}">
                                        Category</option>
                                </select>
                            </div>

                            <!-- Published Year -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Published year
                                </label>
                                <input type="number" th:field="*{publishedYear}" min="0" max="3000"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="2026">
                            </div>

                            <!-- Publisher -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Publisher
                                </label>
                                <input type="text" th:field="*{publisher}"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="Enter Publisher Name">
                            </div>

                            <!-- Width -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Width (cm)
                                </label>
                                <input type="number" th:field="*{widthCm}" min="0" step="0.01"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="0.00">
                            </div>

                            <!-- Height -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Height (cm)
                                </label>
                                <input type="number" th:field="*{heightCm}" min="0" step="0.01"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="0.00">
                            </div>

                            <!-- Thickness -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Thickness (cm)
                                </label>
                                <input type="number" th:field="*{thicknessCm}" min="0" step="0.01"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="0.00">
                            </div>

                            <!-- Page Count -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Page count
                                </label>
                                <input type="number" th:field="*{pageCount}" min="1"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="0">
                            </div>

                            <!-- Upload image -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Image from URL
                                </label>
                                <input type="url" th:field="*{imageUrl}"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="https://example.com/book-cover.jpg">
                                <p class="text-xs text-gray-500 mt-2">You can paste an image URL here or upload a file
                                    from your device below.</p>
                            </div>

                            <!-- Upload image -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Book image
                                </label>
                                <input type="file" name="imageFile" accept="image/*"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition bg-white">
                                <p class="text-xs text-gray-500 mt-2">If both URL and file are provided, the uploaded
                                    file will be used. Supported formats: JPG, JPEG, PNG, GIF, WEBP.</p>
                                <div th:if="${book.imageUrl != null and !book.imageUrl.isEmpty()}" class="mt-4">
                                    <p class="text-sm font-medium text-gray-700 mb-2">Current image:</p>
                                    <img th:src="${book.imageUrl}" alt="Book Image" class="h-40 rounded-lg border"
                                        onerror="this.style.display='none'">
                                </div>
                            </div>

                            <!-- Description -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Description
                                </label>
                                <textarea th:field="*{description}" rows="4"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition resize-none"
                                    placeholder="Enter Book Description..."></textarea>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex justify-end space-x-4 mt-8 pt-6 border-t">
                            <a href="/admin/books"
                                class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                                Cancel
                            </a>
                            <button type="submit" class="px-6 py-3 text-white rounded-lg transition font-medium"
                                style="background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);">
                                <span th:text="${book.id != null ? 'Update' : 'Add Books'}">Add Books</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function () {
            const typeSelect = document.getElementById('productTypeSelect');
            const categorySelect = document.getElementById('categorySelect');
            if (!typeSelect || !categorySelect) return;

            const options = Array.from(categorySelect.options).slice(1);

            function inferTypeFromCategory() {
                const selectedCategory = categorySelect.options[categorySelect.selectedIndex];
                if (!selectedCategory) return;
                const categoryType = selectedCategory.getAttribute('data-product-type');
                if (categoryType && !typeSelect.value) {
                    typeSelect.value = categoryType;
                }
            }

            function filterCategories() {
                const selectedType = typeSelect.value;
                const currentCategory = categorySelect.value;

                options.forEach(function (option) {
                    const optionType = option.getAttribute('data-product-type');
                    const visible = !selectedType || (optionType && optionType === selectedType);
                    option.hidden = !visible;
                });

                const stillValid = options.some(function (option) {
                    return option.value === currentCategory && !option.hidden;
                });

                if (currentCategory && !stillValid) {
                    categorySelect.value = '';
                }
            }

            inferTypeFromCategory();
            filterCategories();
            typeSelect.addEventListener('change', filterCategories);
        })();
    </script>
</body>

</html>
