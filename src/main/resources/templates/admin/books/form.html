<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.id != null ? 'Chỉnh Sửa Sách' : 'Thêm Sách Mới'} + ' - BookNest'">Quản Lý Sách - BookNest
    </title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar w-64 text-white flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/20">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">BookNest</h1>
                        <p class="text-xs text-white/70">Admin Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="/admin" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span class="font-medium">Dashboard</span>
                </a>
                <a href="/admin/books" class="sidebar-item active flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span class="font-medium">Quản lý sách</span>
                </a>
                <a href="/admin/categories" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                    </svg>
                    <span class="font-medium">Danh mục</span>
                </a>
                <a href="/admin/users" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span class="font-medium">Người dùng</span>
                </a>
                <a href="/admin/orders" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span class="font-medium">Đơn hàng</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/20">
                <div class="flex items-center space-x-3 px-4 py-3">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="font-semibold text-sm truncate">Admin</p>
                        <p class="text-xs text-white/70 truncate">booknest@admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900"
                        th:text="${book.id != null ? 'Chỉnh Sửa Sách' : 'Thêm Sách Mới'}">Thêm Sách Mới</h1>
                    <p class="text-gray-600 mt-1">Điền thông tin chi tiết về sách</p>
                </div>

                <!-- Form Card -->
                <div class="bg-white rounded-xl shadow-sm p-8">
                    <form th:action="@{/admin/books/save}" method="post" th:object="${book}">
                        <input type="hidden" th:field="*{id}" />

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Tiêu đề -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Tiêu đề sách <span class="text-red-500">*</span>
                                </label>
                                <input type="text" th:field="*{title}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brown-500 focus:border-transparent transition"
                                    placeholder="Nhập tiêu đề sách">
                            </div>

                            <!-- Tác giả -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Tác giả <span class="text-red-500">*</span>
                                </label>
                                <input type="text" th:field="*{author}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brown-500 focus:border-transparent transition"
                                    placeholder="Nhập tên tác giả">
                            </div>

                            <!-- Giá -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Giá (VNĐ) <span class="text-red-500">*</span>
                                </label>
                                <input type="number" th:field="*{price}" required min="0" step="1000"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brown-500 focus:border-transparent transition"
                                    placeholder="0">
                            </div>

                            <!-- Số lượng -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Số lượng tồn kho <span class="text-red-500">*</span>
                                </label>
                                <input type="number" th:field="*{stock}" required min="0"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brown-500 focus:border-transparent transition"
                                    placeholder="0">
                            </div>

                            <!-- Danh mục -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Danh mục <span class="text-red-500">*</span>
                                </label>
                                <select th:field="*{category.id}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brown-500 focus:border-transparent transition">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">
                                        Danh mục</option>
                                </select>
                            </div>

                            <!-- URL Hình ảnh -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    URL Hình ảnh
                                </label>
                                <input type="text" th:field="*{imageUrl}"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brown-500 focus:border-transparent transition"
                                    placeholder="https://example.com/image.jpg">
                            </div>

                            <!-- Mô tả -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Mô tả
                                </label>
                                <textarea th:field="*{description}" rows="4"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brown-500 focus:border-transparent transition resize-none"
                                    placeholder="Nhập mô tả về sách..."></textarea>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex justify-end space-x-4 mt-8 pt-6 border-t">
                            <a href="/admin/books"
                                class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                                Hủy
                            </a>
                            <button type="submit" class="px-6 py-3 text-white rounded-lg transition font-medium"
                                style="background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);">
                                <span th:text="${book.id != null ? 'Cập Nhật' : 'Thêm Sách'}">Thêm Sách</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
