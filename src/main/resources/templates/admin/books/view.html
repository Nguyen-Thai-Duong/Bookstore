<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.title} + ' - Book Details - BookNest'">Book Details - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('books')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64 overflow-y-auto">
            <div class="p-8">
                <!-- Header -->
                <div class="mb-8 flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">Book Details</h1>
                        <p class="text-gray-600 mt-1">Detailed book information</p>
                    </div>
                    <div class="flex gap-3">
                        <a th:href="@{/admin/books/edit/{id}(id=${book.id})}"
                            class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition font-medium">
                            Edit
                        </a>
                        <a href="/admin/books"
                            class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                            Back
                        </a>
                    </div>
                </div>

                <!-- Book Details Card -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="md:flex">
                        <!-- Book Image -->
                        <div class="md:w-1/3 bg-gray-100 p-8 flex items-center justify-center">
                            <img th:if="${book.imageUrl != null && !book.imageUrl.isEmpty()}" th:src="${book.imageUrl}"
                                th:alt="${book.title}" class="max-w-full max-h-96 rounded-lg shadow-md object-cover">
                            <div th:unless="${book.imageUrl != null && !book.imageUrl.isEmpty()}"
                                class="w-64 h-96 bg-gradient-to-br from-gray-200 to-gray-300 rounded-lg shadow-md flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-gray-400" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                </svg>
                            </div>
                        </div>

                        <!-- Book Information -->
                        <div class="md:w-2/3 p-8">
                            <h2 class="text-2xl font-bold text-gray-900 mb-6" th:text="${book.title}">Book Name</h2>

                            <div class="space-y-4">
                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">ID:</div>
                                    <div class="flex-1 text-gray-600" th:text="${book.id}">1</div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Book Title:</div>
                                    <div class="flex-1 text-gray-600" th:text="${book.title}">Book Title</div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Author:</div>
                                    <div class="flex-1 text-gray-600" th:text="${book.author}">Author</div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Price:</div>
                                    <div class="flex-1">
                                        <span class="text-2xl font-bold text-green-600"
                                            th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + 'd'">0d</span>
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Kho:</div>
                                    <div class="flex-1">
                                        <span class="px-3 py-1 rounded-full text-sm font-semibold"
                                            th:classappend="${book.stock > 10 ? 'bg-green-100 text-green-800' : (book.stock > 0 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800')}"
                                            th:text="${book.stock}">0</span>
                                        <span class="ml-2 text-gray-500 text-sm">book(s)</span>
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Category:</div>
                                    <div class="flex-1">
                                        <a th:if="${book.category != null}"
                                            th:href="@{/admin/categories/{id}(id=${book.category.id})}"
                                            class="inline-block px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium hover:bg-blue-200 transition"
                                            th:text="${book.category.name}">Category</a>
                                        <span th:unless="${book.category != null}"
                                            class="text-gray-400">Uncategorized</span>
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Product Type:</div>
                                    <div class="flex-1 text-gray-600"
                                        th:text="${book.category != null and book.category.productTypeName != null ? book.category.productTypeName : 'N/A'}">
                                        N/A
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Published Year:</div>
                                    <div class="flex-1 text-gray-600"
                                        th:text="${book.publishedYear != null ? book.publishedYear : 'N/A'}">N/A</div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Publisher:</div>
                                    <div class="flex-1 text-gray-600"
                                        th:text="${book.publisher != null and !book.publisher.isEmpty() ? book.publisher : 'N/A'}">
                                        N/A
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Size (W x H x T):</div>
                                    <div class="flex-1 text-gray-600"
                                        th:text="${book.widthCm != null and book.heightCm != null and book.thicknessCm != null ? #numbers.formatDecimal(book.widthCm, 1, 'COMMA', 2, 'POINT') + ' x ' + #numbers.formatDecimal(book.heightCm, 1, 'COMMA', 2, 'POINT') + ' x ' + #numbers.formatDecimal(book.thicknessCm, 1, 'COMMA', 2, 'POINT') + ' cm' : 'N/A'}">
                                        N/A
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Page Count:</div>
                                    <div class="flex-1 text-gray-600"
                                        th:text="${book.pageCount != null ? book.pageCount : 'N/A'}">N/A</div>
                                </div>

                                <div class="flex items-start pt-2">
                                    <div class="w-40 font-semibold text-gray-700">Description:</div>
                                    <div class="flex-1 text-gray-600 whitespace-pre-wrap"
                                        th:text="${book.description != null && !book.description.isEmpty() ? book.description : 'No description'}">
                                        Book description</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
