<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.title} + ' - Chi Tiết Sách - BookNest'">Chi Tiết Sách - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar w-64 text-white flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/20">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">BookNest</h1>
                        <p class="text-xs text-white/70">Admin Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="/admin" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span class="font-medium">Dashboard</span>
                </a>
                <a href="/admin/books" class="sidebar-item active flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span class="font-medium">Quản lý sách</span>
                </a>
                <a href="/admin/categories" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                    </svg>
                    <span class="font-medium">Danh mục</span>
                </a>
                <a href="/admin/users" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span class="font-medium">Người dùng</span>
                </a>
                <a href="/admin/orders" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span class="font-medium">Đơn hàng</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/20">
                <div class="flex items-center space-x-3 px-4 py-3">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="font-semibold text-sm truncate">Admin</p>
                        <p class="text-xs text-white/70 truncate">booknest@admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <!-- Header -->
                <div class="mb-8 flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">Chi Tiết Sách</h1>
                        <p class="text-gray-600 mt-1">Thông tin chi tiết về sách</p>
                    </div>
                    <div class="flex gap-3">
                        <a th:href="@{/admin/books/edit/{id}(id=${book.id})}"
                            class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition font-medium">
                            Chỉnh Sửa
                        </a>
                        <a href="/admin/books"
                            class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                            Quay Lại
                        </a>
                    </div>
                </div>

                <!-- Book Details Card -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="md:flex">
                        <!-- Book Image -->
                        <div class="md:w-1/3 bg-gray-100 p-8 flex items-center justify-center">
                            <img th:if="${book.imageUrl != null && !book.imageUrl.isEmpty()}" th:src="${book.imageUrl}"
                                th:alt="${book.title}" class="max-w-full max-h-96 rounded-lg shadow-md object-cover">
                            <div th:unless="${book.imageUrl != null && !book.imageUrl.isEmpty()}"
                                class="w-64 h-96 bg-gradient-to-br from-gray-200 to-gray-300 rounded-lg shadow-md flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-gray-400" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                </svg>
                            </div>
                        </div>

                        <!-- Book Information -->
                        <div class="md:w-2/3 p-8">
                            <h2 class="text-2xl font-bold text-gray-900 mb-6" th:text="${book.title}">Tên Sách</h2>

                            <div class="space-y-4">
                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">ID:</div>
                                    <div class="flex-1 text-gray-600" th:text="${book.id}">1</div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Tên sách:</div>
                                    <div class="flex-1 text-gray-600" th:text="${book.title}">Tên sách</div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Tác giả:</div>
                                    <div class="flex-1 text-gray-600" th:text="${book.author}">Tác giả</div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Giá:</div>
                                    <div class="flex-1">
                                        <span class="text-2xl font-bold text-green-600"
                                            th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0
                                            ₫</span>
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Kho:</div>
                                    <div class="flex-1">
                                        <span class="px-3 py-1 rounded-full text-sm font-semibold"
                                            th:classappend="${book.stock > 10 ? 'bg-green-100 text-green-800' : (book.stock > 0 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800')}"
                                            th:text="${book.stock}">0</span>
                                        <span class="ml-2 text-gray-500 text-sm">cuốn</span>
                                    </div>
                                </div>

                                <div class="flex items-start border-b border-gray-100 pb-4">
                                    <div class="w-40 font-semibold text-gray-700">Danh mục:</div>
                                    <div class="flex-1">
                                        <a th:if="${book.category != null}"
                                            th:href="@{/admin/categories/{id}(id=${book.category.id})}"
                                            class="inline-block px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium hover:bg-blue-200 transition"
                                            th:text="${book.category.name}">Danh mục</a>
                                        <span th:unless="${book.category != null}" class="text-gray-400">Chưa phân
                                            loại</span>
                                    </div>
                                </div>

                                <div class="flex items-start pt-2">
                                    <div class="w-40 font-semibold text-gray-700">Mô tả:</div>
                                    <div class="flex-1 text-gray-600 whitespace-pre-wrap"
                                        th:text="${book.description != null && !book.description.isEmpty() ? book.description : 'Chưa có mô tả'}">
                                        Mô tả sách</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
