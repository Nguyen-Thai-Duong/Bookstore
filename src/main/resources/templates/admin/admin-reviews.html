<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Review Management</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #333333;
            --color-border: #e5e0d8;
            --color-success: #00A859;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(243, 112, 33, 0.32);
        }

        .review-card {
            background: #fff;
            border-radius: 16px;
            padding: 22px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .user-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f3f4f6;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rating-stars {
            background: #fef9c3;
            color: #854d0e;
            padding: 5px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .review-content-area {
            background: #f9fafb;
            border-left: 4px solid #d1d5db;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .review-text {
            font-size: 15px;
            color: #374151;
            font-style: italic;
            margin: 0;
        }

        .delete-review-zone {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .btn-delete-review {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-delete-review:hover {
            background: #fecaca;
        }

        .reply-area {
            border-top: 1px dotted #e5e7eb;
            padding-top: 16px;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #F37021;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .current-reply-display {
            background: #f5f3ff;
            color: #5b21b6;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .reply-input {
            width: 100%;
            min-height: 86px;
            resize: none;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        .reply-input:focus {
            border-color: #F37021;
        }

        .reply-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .reply-actions form {
            margin: 0;
        }

        .btn-action {
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
        }

        .btn-save {
            background: #F37021;
            color: #fff;
        }

        .btn-save:hover {
            background: #724630;
        }

        .btn-cancel {
            background: #fff;
            border-color: #d1d5db;
            color: #4b5563;
        }

        .btn-cancel:hover {
            background: #f9fafb;
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="h-full overflow-hidden" style="background-color: var(--color-bg);">
    <div class="flex h-full w-full overflow-hidden">
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('reviews')}"></div>

        <main class="flex-1 ml-64 overflow-y-auto h-full">
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Review Management</h2>
                        <p class="text-sm text-gray-500">List of customer reviews</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <form method="post" action="/logout">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <div class="p-8 space-y-6" id="reviews-panel">
                <div th:if="${reviewSuccess}" class="rounded-xl px-4 py-3 text-sm"
                    style="background-color: rgba(22, 163, 74, 0.12); color: #166534;" th:text="${reviewSuccess}"></div>
                <div th:if="${reviewError}" class="rounded-xl px-4 py-3 text-sm"
                    style="background-color: rgba(220, 38, 38, 0.12); color: #991b1b;" th:text="${reviewError}"></div>

                <div th:if="${#lists.isEmpty(reviews)}" class="bg-white rounded-xl p-6">
                    <p class="text-sm text-gray-500">No reviews yet.</p>
                </div>

                <div th:if="${!#lists.isEmpty(reviews)}" class="space-y-5">
                    <div th:each="review : ${reviews}" class="review-card">
                        <div class="card-header">
                            <div class="user-info">
                                <div class="user-avatar">
                                    <i data-lucide="user" size="20"></i>
                                </div>
                                <div>
                                    <h3 class="text-lg font-semibold"
                                        th:text="${review.user != null ? review.user.fullName : 'User'}">User</h3>
                                    <div class="text-sm text-gray-500 mt-1">
                                        <span
                                            th:text="${review.book != null ? review.book.title : 'Deleted Books'}">Book</span>
                                        <span class="mx-1">•</span>
                                        <span
                                            th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm') : ''}">Time</span>
                                    </div>
                                </div>
                            </div>
                            <div class="rating-stars">
                                <i data-lucide="star" size="14"></i>
                                <span th:text="${review.rating + ' sao'}">5 sao</span>
                            </div>
                        </div>

                        <div class="review-content-area">
                            <p class="review-text"
                                th:text="${review.userComment != null && !review.userComment.isBlank() ? review.userComment : 'No có nội dung'}">
                                Review content
                            </p>
                        </div>

                        <form method="post" th:action="@{/admin/reviews/delete}" class="delete-review-zone"
                            onsubmit="return confirm('Are you sure you want to delete this review?');">
                            <input type="hidden" name="reviewId" th:value="${review.id}">
                            <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                            <button type="submit" class="btn-delete-review">
                                <i data-lucide="trash-2" size="14"></i>
                                Delete this review
                            </button>
                        </form>

                        <div class="reply-area">
                            <div class="section-label"
                                th:text="${review.hasAdminReply() ? 'Shop reply' : 'Write new reply'}">Phản hồi
                                của shop</div>

                            <div th:if="${review.hasAdminReply()}" class="current-reply-display">
                                <span th:text="${review.adminReply}">Reply</span>
                                <i data-lucide="check-circle" size="16"></i>
                            </div>

                            <form method="post" th:action="@{/admin/reviews/reply}" th:id="|reply-form-${review.id}|">
                                <input type="hidden" name="reviewId" th:value="${review.id}">
                                <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                                <textarea name="reply" maxlength="1000" class="reply-input"
                                    th:text="${review.adminReply}"
                                    placeholder="Enter customer reply content..."></textarea>
                            </form>

                            <div class="reply-actions">
                                <button type="submit" class="btn-action btn-save"
                                    th:attr="form=|reply-form-${review.id}|">
                                    <i data-lucide="save" size="16"></i>
                                    <span th:if="${review.hasAdminReply()}">Update phản hồi</span>
                                    <span th:if="${!review.hasAdminReply()}">Send phản hồi</span>
                                </button>

                                <form th:if="${review.hasAdminReply()}" method="post"
                                    th:action="@{/admin/reviews/reply}">
                                    <input type="hidden" name="reviewId" th:value="${review.id}">
                                    <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                                    <input type="hidden" name="reply" value="">
                                    <button type="submit" class="btn-action btn-cancel">Delete phản hồi</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
