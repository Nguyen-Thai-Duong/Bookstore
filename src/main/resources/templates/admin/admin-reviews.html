<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Review Management</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #333333;
            --color-border: #e5e0d8;
            --color-success: #00A859;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(243, 112, 33, 0.32);
        }

        .review-card {
            background: #fff;
            border-radius: 16px;
            padding: 22px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .user-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f3f4f6;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rating-stars {
            background: #fef9c3;
            color: #854d0e;
            padding: 5px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .review-content-area {
            background: #f9fafb;
            border-left: 4px solid #d1d5db;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .review-text {
            font-size: 15px;
            color: #374151;
            font-style: italic;
            margin: 0;
        }

        .delete-review-zone {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .btn-delete-review {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-delete-review:hover {
            background: #fecaca;
        }

        .reply-area {
            border-top: 1px dotted #e5e7eb;
            padding-top: 16px;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #F37021;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .current-reply-display {
            background: #f5f3ff;
            color: #5b21b6;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .reply-input {
            width: 100%;
            min-height: 86px;
            resize: none;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        .reply-input:focus {
            border-color: #F37021;
        }

        .reply-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .reply-actions form {
            margin: 0;
        }

        .btn-action {
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
        }

        .btn-save {
            background: #F37021;
            color: #fff;
        }

        .btn-save:hover {
            background: #724630;
        }

        .btn-cancel {
            background: #fff;
            border-color: #d1d5db;
            color: #4b5563;
        }

        .btn-cancel:hover {
            background: #f9fafb;
        }
            /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="h-full overflow-hidden" style="background-color: var(--color-bg);">
    <div class="flex h-full w-full overflow-hidden">
        <aside class="sidebar w-64 text-white flex flex-col fixed left-0 top-0 h-full">
            <div class="p-6 border-b border-white/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg">BookNest</h1>
                        <p class="text-xs opacity-75">Admin Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-2">
                <a href="/admin" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-3m0 0l7-4 7 4M5 9v7a1 1 0 001 1h12a1 1 0 001-1V9m-9 16l-7-4m0 0V5m7 4l7-4" />
                    </svg>
                    <span>Dashboard</span>
                </a>

                <a href="/admin/books"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span>Book Management</span>
                </a>

                <a href="/admin/categories"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                    <span>Category</span>
                </a>

                <a href="/admin/users"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span>User</span>
                </a>

                <a href="/admin/vouchers"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                    </svg>
                    <span>Voucher</span>
                </a>

                <a href="/admin/reviews"
                    class="sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h8M8 14h5m-9 6l3.6-3.6A2 2 0 003 15V6a2 2 0 012-2h14a2 2 0 012 2v9a2 2 0 01-2 2H9a2 2 0 00-1.4.6L4 21z" />
                    </svg>
                    <span>Review</span>
                </a>

                <a href="/admin/orders"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span>Order</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/20">
                <div class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">Admin</p>
                        <p class="text-xs opacity-75">booknest@admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 ml-64 overflow-y-auto h-full">
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Review Management</h2>
                        <p class="text-sm text-gray-500">List of customer reviews</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <form method="post" action="/logout">
                            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <div class="p-8 space-y-6" id="reviews-panel">
                <div th:if="${reviewSuccess}" class="rounded-xl px-4 py-3 text-sm"
                    style="background-color: rgba(22, 163, 74, 0.12); color: #166534;" th:text="${reviewSuccess}"></div>
                <div th:if="${reviewError}" class="rounded-xl px-4 py-3 text-sm"
                    style="background-color: rgba(220, 38, 38, 0.12); color: #991b1b;" th:text="${reviewError}"></div>

                <div th:if="${#lists.isEmpty(reviews)}" class="bg-white rounded-xl p-6">
                    <p class="text-sm text-gray-500">No reviews yet.</p>
                </div>

                <div th:if="${!#lists.isEmpty(reviews)}" class="space-y-5">
                    <div th:each="review : ${reviews}" class="review-card">
                        <div class="card-header">
                            <div class="user-info">
                                <div class="user-avatar">
                                    <i data-lucide="user" size="20"></i>
                                </div>
                                <div>
                                    <h3 class="text-lg font-semibold"
                                        th:text="${review.user != null ? review.user.fullName : 'User'}">User</h3>
                                    <div class="text-sm text-gray-500 mt-1">
                                        <span
                                            th:text="${review.book != null ? review.book.title : 'Deleted Books'}">Book</span>
                                        <span class="mx-1">•</span>
                                        <span
                                            th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm') : ''}">Time</span>
                                    </div>
                                </div>
                            </div>
                            <div class="rating-stars">
                                <i data-lucide="star" size="14"></i>
                                <span th:text="${review.rating + ' sao'}">5 sao</span>
                            </div>
                        </div>

                        <div class="review-content-area">
                            <p class="review-text"
                                th:text="${review.userComment != null && !review.userComment.isBlank() ? review.userComment : 'No có nội dung'}">
                                Review content
                            </p>
                        </div>

                        <form method="post" th:action="@{/admin/reviews/delete}" class="delete-review-zone"
                            onsubmit="return confirm('Are you sure you want to delete this review?');">
                            <input type="hidden" name="reviewId" th:value="${review.id}">
                            <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                            <button type="submit" class="btn-delete-review">
                                <i data-lucide="trash-2" size="14"></i>
                                Delete this review
                            </button>
                        </form>

                        <div class="reply-area">
                            <div class="section-label"
                                th:text="${review.hasAdminReply() ? 'Shop reply' : 'Write new reply'}">Phản hồi
                                của shop</div>

                            <div th:if="${review.hasAdminReply()}" class="current-reply-display">
                                <span th:text="${review.adminReply}">Reply</span>
                                <i data-lucide="check-circle" size="16"></i>
                            </div>

                            <form method="post" th:action="@{/admin/reviews/reply}" th:id="|reply-form-${review.id}|">
                                <input type="hidden" name="reviewId" th:value="${review.id}">
                                <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                                <textarea name="reply" maxlength="1000" class="reply-input"
                                    th:text="${review.adminReply}"
                                    placeholder="Enter customer reply content..."></textarea>
                            </form>

                            <div class="reply-actions">
                                <button type="submit" class="btn-action btn-save"
                                    th:attr="form=|reply-form-${review.id}|">
                                    <i data-lucide="save" size="16"></i>
                                    <span th:if="${review.hasAdminReply()}">Update phản hồi</span>
                                    <span th:if="${!review.hasAdminReply()}">Send phản hồi</span>
                                </button>

                                <form th:if="${review.hasAdminReply()}" method="post"
                                    th:action="@{/admin/reviews/reply}">
                                    <input type="hidden" name="reviewId" th:value="${review.id}">
                                    <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                                    <input type="hidden" name="reply" value="">
                                    <button type="submit" class="btn-action btn-cancel">Delete phản hồi</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
