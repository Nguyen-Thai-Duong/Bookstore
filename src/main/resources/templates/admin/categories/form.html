<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.id != null ? 'Edit Category' : 'Add New Category'} + ' - BookNest'">Category Management -
        BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #F37021;
            --color-secondary: #00A859;
            --color-bg: #f5f5f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* fpt-theme-overrides */
        a {
            transition: color 0.2s ease;
        }

        main a,
        .sidebar-list a,
        .footer-col a,
        .info,
        .text-info {
            color: #0072BC;
        }

        button,
        input[type="submit"],
        .btn,
        .btn-primary,
        .checkout-btn {
            border-radius: 8px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn:hover,
        .btn-primary:hover,
        .checkout-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .alert.success,
        .message.success {
            background: #e8f7ef;
            border-color: #00A859;
            color: #00A859;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: adminSidebar('categories')}"></div>

        <!-- Main Content -->
        <main class="flex-1 ml-64 overflow-y-auto">
            <div class="p-8">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900"
                        th:text="${category.id != null ? 'Edit Category' : 'Add New Category'}">Add New Category
                    </h1>
                    <p class="text-gray-600 mt-1">Fill in detailed category information</p>
                </div>

                <!-- Form Card -->
                <div class="bg-white rounded-xl shadow-sm p-8 max-w-2xl">
                    <form th:action="@{/admin/categories/save}" method="post" th:object="${category}">
                        <input type="hidden" th:field="*{id}" />

                        <div class="space-y-6">
                            <!-- Category Name -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Category Name <span class="text-red-500">*</span>
                                </label>
                                <input type="text" th:field="*{name}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                                    placeholder="Enter category name">
                            </div>

                            <!-- Product Type -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Product Type <span class="text-red-500">*</span>
                                </label>
                                <select th:field="*{productTypeId}" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                                    <option value="">-- Select Product Type --</option>
                                    <option th:each="type : ${productTypes}" th:value="${type.id}" th:text="${type.name}">
                                        Type</option>
                                </select>
                            </div>

                            <!-- Description -->
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Description
                                </label>
                                <textarea th:field="*{description}" rows="5"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition resize-none"
                                    placeholder="Enter category description..."></textarea>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex justify-end space-x-4 mt-8 pt-6 border-t">
                            <a href="/admin/categories"
                                class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                                Cancel
                            </a>
                            <button type="submit" class="px-6 py-3 text-white rounded-lg transition font-medium"
                                style="background: linear-gradient(135deg, var(--color-primary) 0%, #D95F14 100%);">
                                <span th:text="${category.id != null ? 'Update' : 'Add Category'}">Add Category</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
