<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Purchase Request - BookNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('purchase-orders')}"></div>

    <main class="ml-64 p-8">
        <div class="max-w-5xl mx-auto">
            <div class="mb-6">
                <a href="/admin/purchase-orders" class="text-orange-500 hover:underline">← Back to List</a>
                <h1 class="text-2xl font-bold text-gray-800 mt-2">Create Purchase Request</h1>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-8">
                <form th:action="@{/admin/purchase-orders/save}" method="post" id="poForm" class="space-y-6">
                    <!-- Chọn Nhà cung cấp -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Select Supplier</label>
                        <select name="supplierId" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                            <option value="">-- Choose Supplier --</option>
                            <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.supplierName}"></option>
                        </select>
                    </div>

                    <!-- Danh sách sản phẩm -->
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <label class="block text-sm font-semibold text-gray-700">Product Details</label>
                        </div>
                        
                        <div id="product-list" class="space-y-4">
                            <!-- Header labels for columns -->
                            <div class="grid grid-cols-12 gap-4 px-4 text-xs font-bold text-gray-400 uppercase">
                                <div class="col-span-4">Product</div>
                                <div class="col-span-2">Quantity</div>
                                <div class="col-span-3">Unit Price</div>
                                <div class="col-span-2 text-right">Subtotal</div>
                                <div class="col-span-1"></div>
                            </div>

                            <div class="product-item grid grid-cols-12 gap-4 items-center bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <div class="col-span-4">
                                    <select name="productIds" required class="w-full px-3 py-2 border rounded focus:ring-1 focus:ring-orange-500 text-sm">
                                        <option value="">-- Select Product --</option>
                                        <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.title + ' (Stock: ' + p.stock + ')'}"></option>
                                    </select>
                                </div>
                                <div class="col-span-2">
                                    <input type="number" name="quantities" min="1" value="1" required placeholder="Qty" 
                                           class="qty-input w-full px-3 py-2 border rounded text-sm focus:ring-1 focus:ring-orange-500">
                                </div>
                                <div class="col-span-3">
                                    <input type="number" name="prices" min="0" value="0" step="1000" required placeholder="Price" 
                                           class="price-input w-full px-3 py-2 border rounded text-sm focus:ring-1 focus:ring-orange-500">
                                </div>
                                <div class="col-span-2 text-right font-bold text-gray-700">
                                    <span class="subtotal-display">0</span> đ
                                </div>
                                <div class="col-span-1 text-center">
                                    <button type="button" onclick="removeRow(this)" class="text-red-400 hover:text-red-600 transition">
                                        <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-6 p-4 bg-gray-100 rounded-lg">
                            <button type="button" onclick="addProductRow()" class="text-sm bg-white text-orange-600 px-4 py-2 rounded-lg border border-orange-200 hover:bg-orange-50 transition font-medium">
                                + Add Another Product
                            </button>
                            <div class="text-right">
                                <span class="text-gray-500 text-sm mr-2 uppercase font-bold">Grand Total:</span>
                                <span id="grand-total" class="text-2xl font-black text-orange-600">0</span>
                                <span class="text-lg font-bold text-orange-600 ml-1">VNĐ</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t flex justify-end gap-4">
                        <a href="/admin/purchase-orders" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Cancel</a>
                        <button type="submit" class="px-8 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 shadow-lg shadow-orange-200 transition font-bold">
                            Create Purchase Request
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        function addProductRow() {
            const firstRow = document.querySelector('.product-item');
            const newRow = firstRow.cloneNode(true);
            newRow.querySelector('.qty-input').value = '1';
            newRow.querySelector('.price-input').value = '0';
            newRow.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
            newRow.querySelector('.subtotal-display').innerText = '0';
            document.getElementById('product-list').appendChild(newRow);
            attachEvents();
        }

        function removeRow(btn) {
            const rows = document.querySelectorAll('.product-item');
            if (rows.length > 1) {
                btn.closest('.product-item').remove();
                calculateTotal();
            } else {
                alert("At least one product is required.");
            }
        }

        function calculateTotal() {
            let grandTotal = 0;
            document.querySelectorAll('.product-item').forEach(row => {
                let qtyInput = row.querySelector('.qty-input');
                let priceInput = row.querySelector('.price-input');
                
                // Ngăn chặn số âm ngay khi nhập
                if (qtyInput.value < 0) qtyInput.value = 1;
                if (priceInput.value < 0) priceInput.value = 0;

                const qty = parseFloat(qtyInput.value) || 0;
                const price = parseFloat(priceInput.value) || 0;
                const subtotal = qty * price;
                row.querySelector('.subtotal-display').innerText = subtotal.toLocaleString('vi-VN');
                grandTotal += subtotal;
            });
            document.getElementById('grand-total').innerText = grandTotal.toLocaleString('vi-VN');
        }

        function attachEvents() {
            document.querySelectorAll('.qty-input, .price-input').forEach(input => {
                input.removeEventListener('input', calculateTotal);
                input.addEventListener('input', calculateTotal);
                // Thêm sự kiện change để chắc chắn không bị bypass bằng cách copy-paste số âm
                input.addEventListener('change', calculateTotal);
            });
        }

        // Initialize
        attachEvents();
    </script>
</body>
</html>
