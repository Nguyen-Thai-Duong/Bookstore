<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirm Import - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar('confirm-purchase-orders')}"></div>

    <main class="ml-64 p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Purchase Order Confirmation & History</h1>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-700">Order ID</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Staff</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Supplier</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Total Amount</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Status</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <!-- Bỏ th:if ở đây để hiện toàn bộ đơn hàng -->
                    <tr th:each="order : ${orders}" class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-mono text-blue-600" th:text="'PO-' + ${order.id}"></td>
                        <td class="px-6 py-4 text-gray-800" th:text="${order.user.fullName}"></td>
                        <td class="px-6 py-4 text-gray-800" th:text="${order.supplier.supplierName}"></td>
                        <td class="px-6 py-4 font-bold text-orange-600" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}"></td>
                        <td class="px-6 py-4">
                            <span th:class="${'px-2 py-1 rounded text-xs font-bold ' + 
                                (order.status == 'Requested' ? 'bg-yellow-100 text-yellow-700' : 
                                 order.status == 'Pending' ? 'bg-blue-100 text-blue-700' : 
                                 order.status == 'Received' ? 'bg-purple-100 text-purple-700' : 
                                 order.status == 'Finalized' ? 'bg-indigo-100 text-indigo-700' : 
                                 order.status == 'Completed' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')}"
                                  th:text="${order.status}"></span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <!-- Nút Xem luôn luôn hiện -->
                            <a th:href="@{'/admin/purchase-orders/view/' + ${order.id}}" class="text-blue-600 hover:underline text-sm font-medium">View</a>

                            <!-- Bước 2: Chỉ hiện nút Approve khi đơn là Requested -->
                            <form th:if="${order.status == 'Requested'}" th:action="@{'/admin/purchase-orders/approve/' + ${order.id}}" method="post" class="inline">
                                <button type="submit" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 text-sm">Approve</button>
                            </form>

                            <!-- Bước 4: Chỉ hiện nút Finalize khi đơn là Received -->
                            <a th:if="${order.status == 'Received'}" th:href="@{'/admin/purchase-orders/finalize/' + ${order.id}}" 
                               class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600 text-sm">Finalize</a>
                            
                            <!-- Nếu đã hoàn tất hoặc đã hủy, chỉ hiện text thông báo -->
                            <span th:if="${order.status == 'Completed'}" class="text-gray-400 italic text-xs">Archived</span>
                            <span th:if="${order.status == 'Cancelled'}" class="text-red-400 italic text-xs">Cancelled</span>
                            <span th:if="${order.status == 'Pending'}" class="text-blue-400 italic text-xs">Waiting for Goods</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
