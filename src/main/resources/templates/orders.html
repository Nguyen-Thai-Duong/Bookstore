<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-[#f8f6f1] text-[#1a1410]">
<div class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold">Đơn hàng của bạn</h1>
        <a th:href="@{/books}" class="text-sm underline">Xem sách</a>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="bg-white rounded-2xl p-6">
        <p>Chưa có đơn hàng.</p>
    </div>

    <div th:if="${!#lists.isEmpty(orders)}" class="space-y-4">
        <div th:each="order : ${orders}" class="bg-white rounded-2xl p-4">
            <div class="flex justify-between">
                <div>
                    <div class="font-semibold" th:text="${order.orderID}">ORDER-ID</div>
                    <div class="text-sm text-gray-600" th:text="${order.orderStatus}">Status</div>
                </div>
                <div class="text-sm" th:text="${order.totalAmount}">0</div>
            </div>
            <a th:href="@{/orders/{id}(id=${order.orderID})}" class="text-sm underline">Xem chi tiết</a>
        </div>
    </div>
</div>
</body>
</html>
