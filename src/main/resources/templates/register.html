<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg: #f8f6f1;
            --color-surface: #ffffff;
            --color-text: #1a1410;
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 90, 60, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(139, 90, 60, 0.5);
        }

        .hero-pattern {
            background: linear-gradient(135deg, rgba(139, 90, 60, 0.03) 0%, rgba(212, 165, 116, 0.03) 100%);
        }
    </style>
</head>

<body class="h-full overflow-auto">
    <div class="min-h-full w-full">
        <header class="sticky top-0 z-50 backdrop-blur-md" style="background-color: rgba(250, 247, 242, 0.95);">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16 sm:h-20">
                    <a class="flex items-center gap-3" th:href="@{/}">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                            style="background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg>
                        </div>
                        <span class="font-display text-xl sm:text-2xl font-bold">BookNest</span>
                    </a>
                    <div class="flex items-center gap-2 sm:gap-4">
                        <a th:href="@{/register}"
                            class="btn-primary px-4 py-2 rounded-full text-white font-semibold">Đăng ký</a>
                        <a th:href="@{/login}" class="px-4 py-2 rounded-full font-medium border-2"
                            style="border-color: var(--color-primary); color: var(--color-primary);">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </header>

        <section class="hero-pattern py-12 sm:py-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="grid lg:grid-cols-2 gap-8 items-center">
                    <div class="text-center lg:text-left">
                        <h1 class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold mb-4">
                            Tạo tài khoản mới
                        </h1>
                        <p class="text-lg" style="color: #6b6560;">
                            Tham gia BookNest để lưu giỏ hàng và theo dõi đơn hàng dễ dàng.
                        </p>
                    </div>
                    <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
                        <h2 class="text-2xl font-semibold mb-2">Đăng ký</h2>
                        <p class="text-sm mb-6" style="color: #6b6560;">Vui lòng điền thông tin bên dưới</p>

                        <div th:if="${error}" class="mb-4 rounded-xl px-4 py-3 text-sm"
                            style="background-color: rgba(220, 38, 38, 0.1); color: #b91c1c;" th:text="${error}"></div>

                        <form id="registerForm" method="post" th:action="@{/register}" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Họ và tên</label>
                                <input type="text" id="fullName" name="fullName" required
                                    class="w-full px-4 py-3 rounded-xl border-2 focus:outline-none"
                                    style="border-color: #e5e0d8; background-color: var(--color-surface);"
                                    onfocus="this.style.borderColor='var(--color-primary)'" onblur="validateFullName()">
                                <div id="fullNameError" class="text-sm mt-1" style="color: #dc2626; display: none;">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Email</label>
                                <input type="email" id="email" name="email" required
                                    class="w-full px-4 py-3 rounded-xl border-2 focus:outline-none"
                                    style="border-color: #e5e0d8; background-color: var(--color-surface);"
                                    onfocus="this.style.borderColor='var(--color-primary)'" onblur="validateEmail()">
                                <div id="emailError" class="text-sm mt-1" style="color: #dc2626; display: none;"></div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Mật khẩu</label>
                                <div class="relative">
                                    <input type="password" id="password" name="password" required
                                        class="w-full px-4 pr-12 py-3 rounded-xl border-2 focus:outline-none"
                                        style="border-color: #e5e0d8; background-color: var(--color-surface);"
                                        onfocus="this.style.borderColor='var(--color-primary)'"
                                        onblur="validatePassword()">
                                    <button id="toggle-register-password" type="button"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#A35C33] transition-colors"
                                        aria-label="Hiện mật khẩu" aria-pressed="false">
                                        <span id="register-icon-eye-open">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                                viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
                                            </svg>
                                        </span>
                                        <span id="register-icon-eye-off" class="hidden">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                                viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.27-2.943-9.543-7a9.97 9.97 0 012.75-4.36M6.223 6.223A9.965 9.965 0 0112 5c4.478 0 8.27 2.943 9.543 7a9.97 9.97 0 01-4.132 5.411M15 12a3 3 0 00-4.243-2.829M9.88 9.88A3 3 0 0014.12 14.12M3 3l18 18" />
                                            </svg>
                                        </span>
                                    </button>
                                </div>
                                <div id="passwordError" class="text-sm mt-1" style="color: #dc2626; display: none;">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Số điện thoại</label>
                                <input type="text" id="phone" name="phone"
                                    class="w-full px-4 py-3 rounded-xl border-2 focus:outline-none"
                                    style="border-color: #e5e0d8; background-color: var(--color-surface);"
                                    onfocus="this.style.borderColor='var(--color-primary)'" onblur="validatePhone()">
                                <div id="phoneError" class="text-sm mt-1" style="color: #dc2626; display: none;"></div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Địa chỉ</label>
                                <input type="text" id="address" name="address"
                                    class="w-full px-4 py-3 rounded-xl border-2 focus:outline-none"
                                    style="border-color: #e5e0d8; background-color: var(--color-surface);"
                                    onfocus="this.style.borderColor='var(--color-primary)'"
                                    onblur="this.style.borderColor='#e5e0d8'">
                            </div>
                            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold">
                                Đăng ký
                            </button>
                        </form>

                        <p class="text-sm text-center mt-4" style="color: #6b6560;">
                            Đã có tài khoản? <a th:href="@{/login}" style="color: var(--color-primary);">Đăng nhập</a>
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Validation functions with real-time error display
        function validateFullName() {
            const fullName = document.getElementById('fullName').value.trim();
            const errorDiv = document.getElementById('fullNameError');
            const input = document.getElementById('fullName');

            if (fullName === '') {
                errorDiv.textContent = 'Họ và tên: Vui lòng nhập họ và tên';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#dc2626';
                return false;
            } else if (fullName.length < 3) {
                errorDiv.textContent = 'Họ và tên: Phải có ít nhất 3 ký tự';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#dc2626';
                return false;
            } else {
                errorDiv.style.display = 'none';
                input.style.borderColor = '#e5e0d8';
                return true;
            }
        }

        function validateEmail() {
            const email = document.getElementById('email').value.trim();
            const errorDiv = document.getElementById('emailError');
            const input = document.getElementById('email');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (email === '') {
                errorDiv.textContent = 'Email: Vui lòng nhập email';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#dc2626';
                return false;
            } else if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Email: Định dạng email không hợp lệ';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#dc2626';
                return false;
            } else {
                errorDiv.style.display = 'none';
                input.style.borderColor = '#e5e0d8';
                return true;
            }
        }

        function validatePassword() {
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('passwordError');
            const input = document.getElementById('password');

            if (password === '') {
                errorDiv.textContent = 'Mật khẩu: Vui lòng nhập mật khẩu';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#dc2626';
                return false;
            } else if (password.length < 6) {
                errorDiv.textContent = 'Mật khẩu: Phải có ít nhất 6 ký tự';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#dc2626';
                return false;
            } else {
                errorDiv.style.display = 'none';
                input.style.borderColor = '#e5e0d8';
                return true;
            }
        }

        function validatePhone() {
            const phone = document.getElementById('phone').value.trim();
            const errorDiv = document.getElementById('phoneError');
            const input = document.getElementById('phone');
            const phoneRegex = /^[0-9]{10,11}$/;

            if (phone === '') {
                errorDiv.style.display = 'none';
                input.style.borderColor = '#e5e0d8';
                return true;
            } else if (!phoneRegex.test(phone)) {
                errorDiv.textContent = 'Số điện thoại: Phải nhập 10-11 chữ số';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#dc2626';
                return false;
            } else {
                errorDiv.style.display = 'none';
                input.style.borderColor = '#e5e0d8';
                return true;
            }
        }

        // Real-time validation on input
        document.getElementById('fullName').addEventListener('input', validateFullName);
        document.getElementById('email').addEventListener('input', validateEmail);
        document.getElementById('password').addEventListener('input', validatePassword);
        document.getElementById('phone').addEventListener('input', validatePhone);

        // Form submission validation
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            const isFullNameValid = validateFullName();
            const isEmailValid = validateEmail();
            const isPasswordValid = validatePassword();
            const isPhoneValid = validatePhone();

            if (!isFullNameValid || !isEmailValid || !isPasswordValid || !isPhoneValid) {
                e.preventDefault();
            }
        });

        const registerPasswordInput = document.getElementById('password');
        const toggleRegisterPasswordButton = document.getElementById('toggle-register-password');
        const registerIconEyeOpen = document.getElementById('register-icon-eye-open');
        const registerIconEyeOff = document.getElementById('register-icon-eye-off');

        if (registerPasswordInput && toggleRegisterPasswordButton && registerIconEyeOpen && registerIconEyeOff) {
            toggleRegisterPasswordButton.addEventListener('click', function () {
                const showingPassword = registerPasswordInput.type === 'text';
                registerPasswordInput.type = showingPassword ? 'password' : 'text';

                registerIconEyeOpen.classList.toggle('hidden', !showingPassword);
                registerIconEyeOff.classList.toggle('hidden', showingPassword);

                toggleRegisterPasswordButton.setAttribute('aria-pressed', String(!showingPassword));
                toggleRegisterPasswordButton.setAttribute('aria-label', showingPassword ? 'Hiện mật khẩu' : 'Ẩn mật khẩu');
            });
        }
    </script>
</body>

</html>
