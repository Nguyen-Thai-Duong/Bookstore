<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Danh Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Bookstore</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Chi Tiết Danh Mục</h2>

        <div class="card">
            <div class="card-body">
                <p><strong>ID:</strong> <span th:text="${category.id}"></span></p>
                <p><strong>Tên:</strong> <span th:text="${category.name}"></span></p>
                <p><strong>Mô Tả:</strong> <span th:text="${category.description}"></span></p>

                <h4 class="mt-4">Danh Sách Sách Trong Danh Mục</h4>
                <table class="table table-sm" th:if="${category.books != null and !category.books.isEmpty()}">
                    <thead>
                        <tr>
                            <th>Tên Sách</th>
                            <th>Tác Giả</th>
                            <th>Giá</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${category.books}">
                            <td th:text="${book.title}"></td>
                            <td th:text="${book.author}"></td>
                            <td th:text="${book.price}"></td>
                        </tr>
                    </tbody>
                </table>
                <p th:if="${category.books == null or category.books.isEmpty()}">Không có sách nào trong danh mục này.
                </p>

                <div class="mt-3">
                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning">Chỉnh Sửa</a>
                    <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-danger"
                        onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                    <a href="/categories" class="btn btn-secondary">Quay Lại</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
