<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg: #f8f6f1;
            --color-surface: #ffffff;
            --color-text: #1a1410;
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
        }
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
        }
        .font-display {
            font-family: 'Playfair Display', serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 90, 60, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(139, 90, 60, 0.5);
        }
        .hero-pattern {
            background: linear-gradient(135deg, rgba(139, 90, 60, 0.03) 0%, rgba(212, 165, 116, 0.03) 100%);
        }
    </style>
</head>
<body class="h-full overflow-auto">
<div class="min-h-full w-full">
    <header class="sticky top-0 z-50 backdrop-blur-md" style="background-color: rgba(250, 247, 242, 0.95);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 sm:h-20">
                <a class="flex items-center gap-3" th:href="@{/}">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                        style="background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <span class="font-display text-xl sm:text-2xl font-bold">BookNest</span>
                </a>
                <div class="flex items-center gap-2 sm:gap-4">
                    <a th:href="@{/register}" class="px-4 py-2 rounded-full font-medium border-2"
                       style="border-color: var(--color-primary); color: var(--color-primary);">Đăng ký</a>
                    <a th:href="@{/login}" class="btn-primary px-4 py-2 rounded-full text-white font-semibold">Đăng nhập</a>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-pattern py-12 sm:py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid lg:grid-cols-2 gap-8 items-center">
                <div class="text-center lg:text-left">
                    <h1 class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold mb-4">
                        Chào mừng trở lại
                    </h1>
                    <p class="text-lg" style="color: #6b6560;">
                        Đăng nhập để tiếp tục mua sắm và theo dõi đơn hàng của bạn.
                    </p>
                </div>
                <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
                    <h2 class="text-2xl font-semibold mb-2">Đăng nhập</h2>
                    <p class="text-sm mb-6" style="color: #6b6560;">Sử dụng email và mật khẩu của bạn</p>

                    <div th:if="${error}" class="mb-4 rounded-xl px-4 py-3 text-sm"
                         style="background-color: rgba(220, 38, 38, 0.1); color: #b91c1c;" th:text="${error}"></div>

                    <form method="post" th:action="@{/login}" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" name="email" required
                                   class="w-full px-4 py-3 rounded-xl border-2 focus:outline-none"
                                   style="border-color: #e5e0d8; background-color: var(--color-surface);"
                                   onfocus="this.style.borderColor='var(--color-primary)'"
                                   onblur="this.style.borderColor='#e5e0d8'">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Mật khẩu</label>
                            <input type="password" name="password" required
                                   class="w-full px-4 py-3 rounded-xl border-2 focus:outline-none"
                                   style="border-color: #e5e0d8; background-color: var(--color-surface);"
                                   onfocus="this.style.borderColor='var(--color-primary)'"
                                   onblur="this.style.borderColor='#e5e0d8'">
                        </div>
                        <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold">
                            Đăng nhập
                        </button>
                    </form>

                    <p class="text-sm text-center mt-4" style="color: #6b6560;">
                        Chưa có tài khoản? <a th:href="@{/register}" style="color: var(--color-primary);">Đăng ký</a>
                    </p>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
