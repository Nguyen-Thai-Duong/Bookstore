<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-orange: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: var(--bg-gray);
            color: var(--text);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            max-width: 470px;
            margin: 16px auto 30px;
        }

        .panel-head {
            background: #f3f3f3;
            color: var(--vb-orange);
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 700;
            padding: 12px 14px;
            text-transform: uppercase;
            text-align: center;
        }

        .panel-body {
            padding: 16px;
        }

        .instructions {
            margin-bottom: 16px;
            color: #666;
            text-align: center;
            font-size: 13px;
            line-height: 1.6;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #444;
        }

        .field input {
            width: 100%;
            border: 1px solid #d8d8d8;
            border-radius: 4px;
            padding: 11px;
            outline: none;
            box-sizing: border-box;
        }

        .field input:focus {
            border-color: var(--vb-orange);
        }

        .btn-submit {
            width: 100%;
            border: none;
            background: var(--vb-orange);
            color: #fff;
            font-weight: 700;
            border-radius: 4px;
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .error-box {
            margin-bottom: 12px;
            border: 1px solid #f3c3c3;
            background: #fff3f3;
            color: #ba1f1f;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
        }

        .sub-row {
            margin-top: 12px;
            color: #777;
            text-align: center;
        }

        .sub-row a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/site-header :: siteHeader('login')}"></div>

    <main class="container">
        <section class="panel">
            <div class="panel-head">Forgot Password</div>
            <div class="panel-body">
                <p class="instructions">Please enter your registered email to receive an OTP verification code.</p>

                <div th:if="${error}" class="error-box" th:text="${error}"></div>

                <form method="post" th:action="@{/forgot-password}">
                    <div class="field">
                        <label>Registered Email</label>
                        <input type="email" name="email" required placeholder="example@gmail.com">
                    </div>
                    <button type="submit" class="btn-submit">Send OTP Code</button>
                </form>

                <p class="sub-row"><a th:href="@{/login}">Back to Login</a></p>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
