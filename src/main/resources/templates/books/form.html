<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Book Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-brown: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        header {
            background: #fff;
            padding: 15px 0;
            border-bottom: 2px solid var(--vb-brown);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 900;
            color: var(--vb-brown);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-actions {
            display: flex;
            gap: 8px;
        }

        .nav-actions a {
            text-decoration: none;
            border: 1px solid var(--border);
            background: #fff;
            color: #444;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 500;
        }

        .main-wrap {
            max-width: 950px;
            margin: 26px auto;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .panel-header {
            background: #f3f3f3;
            color: var(--vb-brown);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 14px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .panel-body {
            padding: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        .field label {
            font-weight: 600;
            color: #444;
            font-size: 12px;
        }

        .field input,
        .field select,
        .field textarea {
            border: 1px solid #d8d8d8;
            border-radius: 4px;
            padding: 10px;
            outline: none;
            width: 100%;
            font-size: 13px;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--vb-brown);
        }

        .field textarea {
            min-height: 120px;
            resize: vertical;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-primary {
            border: none;
            background: var(--vb-brown);
            color: #fff;
            border-radius: 4px;
            font-weight: 700;
            padding: 10px 16px;
            cursor: pointer;
        }

        .btn-secondary {
            display: inline-block;
            border: 1px solid #ddd;
            background: #fff;
            color: #555;
            border-radius: 4px;
            font-weight: 700;
            padding: 10px 16px;
            text-decoration: none;
        }

        footer {
            background: #fff;
            border-top: 3px solid var(--vb-brown);
            padding: 30px 0;
            margin-top: 40px;
        }

        @media (max-width: 1024px) {
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .logo-text {
                font-size: 28px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/site-header :: siteHeader('books')}"></div>

    <main class="container main-wrap">
        <section class="panel">
            <div class="panel-header" th:text="${book.id != null ? 'Edit book' : 'Add new book'}">Book Form</div>
            <div class="panel-body">
                <form th:action="@{/books}" th:object="${book}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-grid">
                        <div class="field full">
                            <label for="title">Book Title *</label>
                            <input type="text" id="title" th:field="*{title}" required>
                        </div>

                        <div class="field">
                            <label for="author">Author</label>
                            <input type="text" id="author" th:field="*{author}">
                        </div>

                        <div class="field">
                            <label for="isbn">ISBN</label>
                            <input type="text" id="isbn" th:field="*{isbn}">
                        </div>

                        <div class="field">
                            <label for="price">Gia *</label>
                            <input type="number" step="0.01" id="price" th:field="*{price}" required>
                        </div>

                        <div class="field">
                            <label for="stock">Stock *</label>
                            <input type="number" id="stock" th:field="*{stock}" required>
                        </div>

                        <div class="field">
                            <label for="publisher">Publisher</label>
                            <input type="text" id="publisher" th:field="*{publisher}">
                        </div>

                        <div class="field">
                            <label for="publishDate">Publication date</label>
                            <input type="date" id="publishDate" th:field="*{publishDate}">
                        </div>

                        <div class="field full">
                            <label for="category">Category</label>
                            <select id="category" th:field="*{category.id}">
                                <option value="">-- Select Category --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <div class="field full">
                            <label for="description">Mo ta</label>
                            <textarea id="description" th:field="*{description}" rows="4"></textarea>
                        </div>

                        <div class="field full">
                            <label for="imageUrl">URL hinh anh</label>
                            <input type="text" id="imageUrl" th:field="*{imageUrl}">
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn-primary">Save</button>
                        <a th:href="@{/books}" class="btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

        <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
