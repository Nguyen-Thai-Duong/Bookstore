<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Bookstore</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Chi Tiết Sách</h2>

        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <img th:src="${book.imageUrl}" class="img-fluid" alt="Book Cover"
                            onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                    </div>
                    <div class="col-md-8">
                        <h3 th:text="${book.title}">Tên Sách</h3>
                        <p><strong>ID:</strong> <span th:text="${book.id}"></span></p>
                        <p><strong>Tác Giả:</strong> <span th:text="${book.author}"></span></p>
                        <p><strong>ISBN:</strong> <span th:text="${book.isbn}"></span></p>
                        <p><strong>Giá:</strong> <span th:text="${book.price} + ' VNĐ'" class="text-danger fs-4"></span>
                        </p>
                        <p><strong>Tồn Kho:</strong> <span th:text="${book.stock}" class="badge bg-success"></span></p>
                        <p><strong>Nhà Xuất Bản:</strong> <span th:text="${book.publisher}"></span></p>
                        <p><strong>Ngày Xuất Bản:</strong> <span th:text="${book.publishDate}"></span></p>
                        <p><strong>Danh Mục:</strong> <span th:text="${book.category?.name}"></span></p>
                        <p><strong>Mô Tả:</strong></p>
                        <p th:text="${book.description}"></p>

                        <div class="mt-3">
                            <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-warning">Chỉnh Sửa</a>
                            <a th:href="@{/books/delete/{id}(id=${book.id})}" class="btn btn-danger"
                                onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                            <a href="/books" class="btn btn-secondary">Quay Lại</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
