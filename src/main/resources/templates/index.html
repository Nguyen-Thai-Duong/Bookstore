<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Online Bookstore - Buy Books Online</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --vb-green: #3ea31a;
            --vb-brown: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
            --price: #d0021b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 220px 1fr 240px;
            gap: 20px;
        }

        .sidebar-box {
            background: #fff;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .sidebar-box h3 {
            background: #f3f3f3;
            padding: 10px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            color: var(--vb-brown);
            text-transform: uppercase;
        }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-list li a,
        .sidebar-list li span {
            display: block;
            padding: 8px 10px;
            color: #444;
            border-bottom: 1px dotted #eee;
            text-decoration: none;
        }

        .sidebar-list li a:hover {
            background: #fafafa;
            color: var(--vb-brown);
        }

        .promo-banner {
            width: 100%;
            height: 300px;
            background: #eee;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .promo-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content-section {
            background: #fff;
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--vb-brown);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .section-header h2 {
            font-size: 16px;
            color: var(--vb-brown);
            text-transform: uppercase;
        }

        .book-item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .book-card {
            text-align: center;
            padding: 10px;
            border: 1px solid transparent;
            transition: border 0.2s;
            position: relative;
        }

        .book-card:hover {
            border: 1px solid #eee;
        }

        .book-card img {
            width: 110px;
            height: 160px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .book-title {
            font-size: 13px;
            font-weight: 500;
            color: #0066cc;
            margin-bottom: 5px;
            height: 36px;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .author {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
        }

        .price {
            color: var(--price);
            font-weight: bold;
        }

        .sale-off {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: #fff;
            font-size: 10px;
            padding: 2px 4px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/site-header :: siteHeader('home')}"></div>

    <main class="container main-grid">

        <aside>
            <div class="sidebar-box">
                <h3>Product</h3>
                <ul class="sidebar-list">
                    <li><a th:href="@{/books}">Book</a></li>
                    <li><a th:href="@{/stationery}">Stationery</a></li>
                </ul>
            </div>
        </aside>

        <section>

            <div class="promo-banner">
                <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
            </div>

            <div class="content-section">
                <div class="section-header">
                    <h2>Featured new books</h2>
                    <a th:href="@{/books}" style="font-size:11px;">View more</a>
                </div>

                <div class="book-item-grid" th:if="${!books.empty}">
                    <div class="book-card" th:each="book,iter : ${books}" th:if="${iter.index < 8}">

                        <span th:if="${iter.index == 0}" class="sale-off">Hot</span>

                        <a th:href="@{/books/{id}(id=${book.id})}">
                            <img th:src="${book.imageUrl != null && !book.imageUrl.isEmpty() ? book.imageUrl : 'https://via.placeholder.com/110x160'}">
                        </a>

                        <a class="book-title"
                           th:href="@{/books/{id}(id=${book.id})}"
                           th:text="${book.title}">
                        </a>

                        <p class="author" th:text="${book.author}"></p>

                        <p class="price"
                           th:text="${book.price != null ? #numbers.formatDecimal(book.price,0,'COMMA',0,'POINT') + ' VND' : '0 VND'}">
                        </p>

                    </div>
                </div>

                <p th:if="${books.empty}">No books available.</p>
            </div>

        </section>

        <!-- RIGHT -->
        <aside>
            <div class="sidebar-box">
                <h3>Best-selling Books</h3>

                <div class="rank-item" th:each="book,iter : ${books}" th:if="${iter.index < 3}">
                    <strong th:text="${book.title}"></strong>
                    <p th:text="${book.author}"></p>
                </div>
            </div>
        </aside>

    </main>

    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();

        const searchInput = document.getElementById("global-search-input");
        const suggestBox = document.getElementById("global-search-suggest");

        if (searchInput && suggestBox) {
            let debounceTimer;

            const hideSuggestions = () => {
                suggestBox.classList.add("hidden");
                suggestBox.innerHTML = "";
            };

            const renderSuggestions = (items) => {
                if (!items.length) return hideSuggestions();

                suggestBox.innerHTML = items.map(item =>
                    `<a href="/books/${item.id}" style="display:block;padding:10px">${item.title}</a>`
                ).join("");

                suggestBox.classList.remove("hidden");
            };

            searchInput.addEventListener("input", () => {
                const keyword = searchInput.value.trim();
                clearTimeout(debounceTimer);

                if (!keyword) return hideSuggestions();

                debounceTimer = setTimeout(async () => {
                    const res = await fetch(`/books/suggest?q=${keyword}`);
                    const data = await res.json();
                    renderSuggestions(data);
                }, 200);
            });
        }
    </script>

</body>
</html>
