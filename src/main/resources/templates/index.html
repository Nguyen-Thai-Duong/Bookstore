<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Online Bookstore</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 220px 1fr 240px;
            gap: 20px;
        }

        .sidebar-box {
            background: #fff;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .sidebar-box h3 {
            padding: 10px;
            background: #f3f3f3;
            color: #F37021;
        }

        .promo-banner img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .content-section {
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .book-item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .book-card img {
            width: 110px;
            height: 160px;
        }

        .price {
            color: red;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- ✅ HEADER -->
    <div th:replace="~{fragments/site-header :: siteHeader('home')}"></div>

    <main class="container main-grid">

        <!-- LEFT -->
        <aside>
            <div class="sidebar-box">
                <h3>Product</h3>
                <ul>
                    <li><a th:href="@{/books}">Book</a></li>
                    <li>Stationery</li>
                </ul>
            </div>
        </aside>

        <!-- CENTER -->
        <section>

            <div class="promo-banner">
                <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794" alt="">
            </div>

            <div class="content-section">
                <h2>Featured new books</h2>

                <div class="book-item-grid" th:if="${!books.empty}">
                    <div class="book-card" th:each="book,iter : ${books}" th:if="${iter.index < 8}">

                        <a th:href="@{/books/{id}(id=${book.id})}">
                            <img th:src="${book.imageUrl != null ? book.imageUrl : 'https://via.placeholder.com/110x160'}">
                        </a>

                        <a th:text="${book.title}"></a>
                        <p th:text="${book.author}"></p>

                        <p class="price"
                           th:text="${#numbers.formatDecimal(book.price,0,'COMMA',0,'POINT')} + ' VND'">
                        </p>

                    </div>
                </div>

                <p th:if="${books.empty}">No books available.</p>
            </div>

        </section>

        <!-- RIGHT -->
        <aside>
            <div class="sidebar-box">
                <h3>Best-selling Books</h3>

                <div th:each="book,iter : ${books}" th:if="${iter.index < 3}">
                    <strong th:text="${book.title}"></strong>
                    <p th:text="${book.author}"></p>
                </div>
            </div>
        </aside>

    </main>

    <!-- FOOTER -->
    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <!-- JS SEARCH -->
    <script>
        const searchInput = document.getElementById("global-search-input");
        const suggestBox = document.getElementById("global-search-suggest");

        if (searchInput && suggestBox) {
            let debounceTimer;

            const hideSuggestions = () => {
                suggestBox.classList.add("hidden");
                suggestBox.innerHTML = "";
            };

            const renderSuggestions = (items) => {
                if (!items.length) return hideSuggestions();

                suggestBox.innerHTML = items.map(item =>
                    `<a href="/books/${item.id}" style="display:block;padding:8px">${item.title}</a>`
                ).join("");

                suggestBox.classList.remove("hidden");
            };

            searchInput.addEventListener("input", () => {
                const keyword = searchInput.value.trim();
                clearTimeout(debounceTimer);

                if (!keyword) return hideSuggestions();

                debounceTimer = setTimeout(async () => {
                    const res = await fetch(`/books/suggest?q=${keyword}`);
                    const data = await res.json();
                    renderSuggestions(data);
                }, 200);
            });
        }
    </script>

</body>
</html>
