<!doctype html>
<html lang="vi" class="h-full" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Gộp font đẹp -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Source Sans 3', sans-serif;
            background-color: #f8f6f1;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .btn-primary {
            background: #8b5a3c;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>

<body class="h-full">

<div class="min-h-full">

    <!-- HEADER -->
    <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <h1 class="font-display text-2xl font-bold">📚 BookNest</h1>

        <div class="flex gap-4 items-center">
            <a th:href="@{/cart}">🛒</a>

            <!-- Nếu đã login -->
            <div th:if="${session.loggedInUser != null}">
                <span th:text="${session.loggedInUser.fullName}">User</span>
                <form method="post" th:action="@{/logout}" class="inline">
                    <button>Đăng xuất</button>
                </form>
            </div>

            <!-- Nếu chưa login -->
            <div th:if="${session.loggedInUser == null}">
                <a th:href="@{/login}">Đăng nhập</a>
                <a th:href="@{/register}" class="btn-primary">Đăng ký</a>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <section class="text-center py-16">
        <h2 class="font-display text-4xl font-bold mb-4">
            Khám phá thế giới qua từng trang sách
        </h2>
        <p class="mb-6 text-gray-600">
            <span th:text="${books.size()}">0</span>+ đầu sách trong hệ thống
        </p>

        <a th:href="@{/books}" class="btn-primary">Xem sách</a>
    </section>

    <!-- DANH SÁCH SÁCH -->
    <section class="px-6 py-10">
        <h3 class="text-2xl font-bold mb-6">Sách nổi bật</h3>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div th:each="book : ${books}" class="bg-white p-4 rounded shadow">
                <h4 class="font-bold" th:text="${book.title}">Tên sách</h4>
                <p th:text="${book.author}">Tác giả</p>
                <p th:text="${book.price}">Giá</p>

                <a th:href="@{/books/{id}(id=${book.id})}" 
                   class="btn-primary mt-2 inline-block">Xem</a>
            </div>
        </div>
    </section>

    <!-- ADMIN QUICK LINK -->
    <section class="text-center py-10">
        <a href="/admin" class="underline text-gray-600">Vào trang Admin</a>
    </section>

</div>

</body>
</html>
