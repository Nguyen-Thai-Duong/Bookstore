<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest | Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --vb-orange: #F37021;
            --bg-gray: #f5f5f5;
            --border: #ddd;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: var(--bg-gray);
            color: var(--text);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            max-width: 470px;
            margin: 16px auto 30px;
        }

        .panel-head {
            background: #f3f3f3;
            color: var(--vb-orange);
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 700;
            padding: 12px 14px;
            text-transform: uppercase;
            text-align: center;
        }

        .panel-body {
            padding: 16px;
        }

        .instructions {
            text-align: center;
            margin-bottom: 16px;
            color: #666;
            line-height: 1.6;
        }

        .otp-input-group {
            margin-bottom: 12px;
        }

        .otp-input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            text-align: center;
        }

        .otp-input-group input {
            width: 100%;
            border: 2px solid var(--vb-orange);
            border-radius: 4px;
            padding: 12px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 700;
            outline: none;
        }

        .otp-input-group input:focus {
            border-color: var(--vb-orange);
        }

        .timer-box {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 500;
            color: #e53e3e;
        }

        .btn-submit {
            width: 100%;
            border: none;
            background: var(--vb-orange);
            color: #fff;
            font-weight: 700;
            border-radius: 4px;
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .error-box {
            margin-bottom: 16px;
            border: 1px solid #f3c3c3;
            background: #fff3f3;
            color: #ba1f1f;
            border-radius: 4px;
            padding: 10px 12px;
            text-align: center;
            font-weight: 500;
        }

        .resend-box {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }

        .resend-box a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }

        .sub-row {
            margin-top: 12px;
            color: #777;
            text-align: center;
        }

        .sub-row a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/site-header :: siteHeader('login')}"></div>

    <main class="container">
        <section class="panel">
            <div class="panel-head">OTP Verification</div>
            <div class="panel-body">
                <div class="instructions">
                    The OTP code has been sent to your email:<br>
                    <strong
                        th:text="${session.regEmail != null ? session.regEmail : session.forgotEmail}">example@gmail.com</strong>
                </div>

                <div th:if="${error}" class="error-box" th:text="${error}"></div>

                <form method="post" th:action="@{/verify-otp}">
                    <div class="otp-input-group">
                        <label>Enter 6-digit code</label>
                        <input type="text" name="userOtp" maxlength="6" pattern="\d{6}" required autofocus
                            placeholder="000000">
                    </div>

                    <div class="timer-box" id="timer-box">
                        OTP expires in: <span id="timer">180</span>s
                    </div>

                    <button type="submit" class="btn-submit" id="submit-btn">Verify</button>
                </form>

                <div class="resend-box">
                    Didn't receive the code? <a th:href="@{/register/resend-otp}">Resend OTP</a>
                </div>

                <p class="sub-row"><a th:href="@{/forgot-password}">Back to Forgot Password</a></p>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/site-footer :: siteFooter}"></div>

    <script>
        lucide.createIcons();

        let timeLeft = 180;
        const timerDisplay = document.getElementById('timer');
        const submitBtn = document.getElementById('submit-btn');

        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timer-box').innerHTML = "OTP has expired!";
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.5";
                submitBtn.style.cursor = "not-allowed";
            }
        }, 1000);
    </script>
</body>

</html>
