<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - BookNest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-[#f8f6f1] text-[#1a1410]">
<div class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold">Thanh toán</h1>
        <a th:href="@{/cart}" class="text-sm underline">Quay lại giỏ hàng</a>
    </div>

    <div th:if="${checkoutError}" class="mb-4 rounded-xl px-4 py-3 text-sm"
         style="background-color: rgba(220, 38, 38, 0.1); color: #b91c1c;" th:text="${checkoutError}"></div>

    <form method="post" th:action="@{/checkout}" class="bg-white rounded-2xl p-6 space-y-4">
        <div>
            <label class="text-sm font-medium">Họ và tên</label>
            <input type="text" name="fullName" required th:value="${user.fullName}"
                   class="w-full px-3 py-2 border rounded">
        </div>
        <div>
            <label class="text-sm font-medium">Số điện thoại</label>
            <input type="text" name="phone" required th:value="${user.phone}"
                   class="w-full px-3 py-2 border rounded">
        </div>
        <div>
            <label class="text-sm font-medium">Địa chỉ</label>
            <input type="text" name="address" required th:value="${user.address}"
                   class="w-full px-3 py-2 border rounded">
        </div>
        <button type="submit" class="px-4 py-2 rounded bg-[#8b5a3c] text-white">Đặt hàng</button>
    </form>

    <div class="bg-white rounded-2xl p-6 mt-6">
        <h2 class="font-semibold mb-3">Tóm tắt đơn hàng</h2>
        <div th:each="item : ${cart}" class="flex justify-between text-sm">
            <span th:text="${item.book.title}">Title</span>
            <span th:text="${item.quantity}">1</span>
        </div>
        <div class="mt-3 text-sm flex justify-between">
            <span>Tạm tính</span>
            <span th:text="${subtotal}">0</span>
        </div>
        <div class="text-sm flex justify-between">
            <span>Giảm giá</span>
            <span th:text="${discount}">0</span>
        </div>
        <div class="text-sm font-semibold flex justify-between">
            <span>Tổng cộng</span>
            <span th:text="${total}">0</span>
        </div>
    </div>
</div>
</body>
</html>
