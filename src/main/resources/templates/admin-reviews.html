<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Quản Lý Review</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8b5a3c;
            --color-secondary: #d4a574;
            --color-bg: #f8f6f1;
            --color-surface: #ffffff;
            --color-text: #1a1410;
            --color-border: #e5e0d8;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        * {
            box-sizing: border-box;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
        }

        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, #a0522d 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 90, 60, 0.3);
        }
    </style>
</head>

<body class="h-full overflow-auto" style="background-color: var(--color-bg);">
    <div class="flex min-h-full w-full">
        <aside class="sidebar w-64 text-white flex flex-col fixed left-0 top-0 h-full">
            <div class="p-6 border-b border-white/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg">BookNest</h1>
                        <p class="text-xs opacity-75">Admin Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-2">
                <a href="/admin" class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-3m0 0l7-4 7 4M5 9v7a1 1 0 001 1h12a1 1 0 001-1V9m-9 16l-7-4m0 0V5m7 4l7-4" />
                    </svg>
                    <span>Dashboard</span>
                </a>

                <a href="/admin/books"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span>Quản lý sách</span>
                </a>

                <a href="/admin/categories"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                    <span>Danh mục</span>
                </a>

                <a href="/admin/users"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span>Người dùng</span>
                </a>

                <a href="/admin/vouchers"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                    </svg>
                    <span>Voucher</span>
                </a>

                <a href="/admin/reviews"
                    class="sidebar-item active block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h8M8 14h5m-9 6l3.6-3.6A2 2 0 003 15V6a2 2 0 012-2h14a2 2 0 012 2v9a2 2 0 01-2 2H9a2 2 0 00-1.4.6L4 21z" />
                    </svg>
                    <span>Review</span>
                </a>

                <a href="/admin/orders"
                    class="sidebar-item block px-4 py-3 rounded-lg font-medium flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span>Đơn hàng</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/20">
                <div class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">Admin</p>
                        <p class="text-xs opacity-75">booknest@admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 ml-64">
            <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold" style="color: var(--color-text);">Quản Lý Review</h2>
                        <p class="text-sm text-gray-500">Danh sách đánh giá của khách hàng</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <a href="/" class="btn-primary text-white px-6 py-2 rounded-lg font-medium">Xem Website</a>
                    </div>
                </div>
            </header>

            <div class="p-8 space-y-6" id="reviews-panel">
                <div th:if="${reviewSuccess}" class="rounded-xl px-4 py-3 text-sm"
                    style="background-color: rgba(22, 163, 74, 0.12); color: #166534;" th:text="${reviewSuccess}"></div>
                <div th:if="${reviewError}" class="rounded-xl px-4 py-3 text-sm"
                    style="background-color: rgba(220, 38, 38, 0.12); color: #991b1b;" th:text="${reviewError}"></div>

                <div th:if="${#lists.isEmpty(reviews)}" class="bg-white rounded-xl p-6">
                    <p class="text-sm text-gray-500">Chưa có đánh giá nào.</p>
                </div>

                <div th:if="${!#lists.isEmpty(reviews)}" class="space-y-5">
                    <div th:each="review : ${reviews}" class="bg-white rounded-xl border border-gray-100 p-5">
                        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
                            <div>
                                <div class="font-semibold text-sm"
                                    th:text="${review.user != null ? review.user.fullName : 'Người dùng'}">User</div>
                                <div class="text-xs text-gray-500 mt-1">
                                    <span
                                        th:text="${review.book != null ? review.book.title : 'Sách đã xóa'}">Book</span>
                                    <span class="mx-1">•</span>
                                    <span
                                        th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm') : ''}">Time</span>
                                </div>
                            </div>
                            <div class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 font-semibold"
                                th:text="${review.rating + ' sao'}">5 sao</div>
                        </div>

                        <p class="mt-3 text-sm text-gray-700"
                            th:text="${review.userComment != null && !review.userComment.isBlank() ? review.userComment : 'Không có nội dung'}">
                            Review content
                        </p>

                        <div th:if="${review.hasAdminReply()}" class="mt-3 rounded-lg p-3 text-sm"
                            style="background-color: rgba(139, 92, 246, 0.08); color: #4c1d95;">
                            <div class="font-semibold mb-1">Phản hồi hiện tại</div>
                            <p th:text="${review.adminReply}">Reply</p>
                        </div>

                        <form method="post" th:action="@{/admin/reviews/reply}" class="mt-3 space-y-2">
                            <input type="hidden" name="reviewId" th:value="${review.id}">
                            <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                            <textarea name="reply" rows="3" maxlength="1000"
                                class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm"
                                th:text="${review.adminReply}" placeholder="Nhập phản hồi cho review này..."></textarea>
                            <div class="flex flex-wrap gap-2">
                                <button type="submit" class="px-4 py-2 rounded-lg text-white text-sm font-semibold"
                                    style="background-color: #8b5a3c;">Lưu phản hồi</button>
                                <button type="submit" name="reply" value=""
                                    class="px-4 py-2 rounded-lg border border-gray-300 text-sm">Xóa phản hồi</button>
                            </div>
                        </form>

                        <form method="post" th:action="@{/admin/reviews/delete}" class="mt-3"
                            onsubmit="return confirm('Bạn có chắc muốn xóa review này?');">
                            <input type="hidden" name="reviewId" th:value="${review.id}">
                            <input type="hidden" name="redirectTo" value="/admin/reviews#reviews-panel">
                            <button type="submit"
                                class="px-4 py-2 rounded-lg text-sm border border-red-200 text-red-600 hover:bg-red-50">Xóa
                                review</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
